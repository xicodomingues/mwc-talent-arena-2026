<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MWC Talent Arena 2026 – Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:#1a1a1a}
*::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
*::-webkit-scrollbar-thumb:hover{background:#555}
*{scrollbar-color:#444 #1a1a1a}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#282828;
  --text:#e0e0e0;--text2:#aaa;--text3:#777;--accent:#FFD700;--accent2:#00D4FF;
  --radius:10px;--radius-sm:6px;
  font-size:16px;
}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* ── Top Bar (sticky) ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid #222;padding:0.75rem 1rem}
.topbar-inner{margin:0 auto;display:flex;flex-wrap:nowrap;gap:0.5rem;align-items:center;overflow:visible}
.day-toggle{display:flex;gap:0}
.day-toggle button{background:var(--surface2);color:var(--text2);border:1px solid #333;padding:0.35rem 0.75rem;font-size:0.8rem;cursor:pointer;height:36px;min-width:44px}
.day-toggle button:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.day-toggle button:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.day-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.search-box{background:var(--surface2);color:#fff;border:1px solid #444;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);font-size:0.85rem;width:180px;min-width:100px;flex-shrink:1;height:36px;margin-left:auto}
.search-box:focus{outline:none;border-color:var(--accent)}
.help-link{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text3);border:1px solid #333;font-size:0.9rem;text-decoration:none;flex-shrink:0;font-weight:700}
.help-link:hover{color:var(--accent);border-color:var(--accent)}

/* ── Filter Panel ── */
.filter-toggle{display:none;background:var(--surface2);color:var(--text2);border:1px solid #333;padding:0.4rem 0.75rem;border-radius:var(--radius-sm);font-size:0.8rem;cursor:pointer;min-height:44px}
.filter-panel{max-width:1200px;margin:0 auto;padding:0.75rem 1rem;display:flex;flex-wrap:wrap;gap:0.75rem;align-items:flex-start}
.filter-section{display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center}
.filter-section .label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-right:0.25rem;white-space:nowrap}
.pill{background:var(--surface3);color:var(--text3);border:1px solid #3a3a3a;padding:0.3rem 0.6rem;border-radius:999px;cursor:pointer;font-size:0.75rem;white-space:nowrap;min-height:32px;display:inline-flex;align-items:center;transition:all 0.15s}
.pill.active{color:var(--pill-color,var(--accent));border-color:var(--pill-color,var(--accent));background:color-mix(in srgb,var(--pill-color,var(--accent)) 15%,transparent)}
.pill:hover{filter:brightness(1.2)}
.dropdown{position:relative}
.dropdown-btn{background:var(--surface2);color:var(--text2);border:1px solid #444;padding:0.35rem 0.75rem;border-radius:var(--radius-sm);font-size:0.8rem;height:36px;cursor:pointer;display:flex;align-items:center;gap:0.3rem;white-space:nowrap}
.dropdown-btn .label{margin-right:0.15rem}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;background:var(--surface2);border:1px solid #444;border-radius:var(--radius-sm);padding:0.3rem 0;min-width:140px;z-index:50;margin-top:2px}
.dropdown.open .dropdown-menu{display:block}
.dropdown-item{display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.6rem;font-size:0.8rem;color:var(--text);cursor:pointer;min-height:36px}
.dropdown-item:hover{background:var(--surface3)}
.dropdown-item input{accent-color:var(--accent)}

/* ── Hidden sessions ── */
.card.hidden-session,.tl-card.hidden-session,.cal-ev.hidden-session{opacity:0.3;border-style:dashed}
.card.hidden-session .card-title,.tl-card.hidden-session .card-title{text-decoration:line-through}
.hide-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.8rem;padding:0.2rem 0.4rem;border-radius:var(--radius-sm);float:right;min-width:32px;min-height:32px;display:inline-flex;align-items:center;justify-content:center}
.hide-btn:hover{color:#fff;background:var(--surface3)}
.show-hidden-toggle{background:var(--surface2);color:var(--text2);border:1px solid #333;padding:0.35rem 0.75rem;border-radius:var(--radius-sm);font-size:0.8rem;cursor:pointer;height:36px;margin-right:0}
.show-hidden-toggle.active{background:#E74C3C33;color:#E74C3C;border-color:#E74C3C}

/* ── Stats & View Toggle ── */
.stats{font-size:0.75rem;color:var(--text3);white-space:nowrap}
.view-btns{display:flex;gap:0}
.view-btns button{background:var(--surface2);color:var(--text2);border:1px solid #333;padding:0.35rem 0.75rem;font-size:0.8rem;cursor:pointer;height:36px}
.view-btns button:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.view-btns button:nth-child(2){border-left:0;border-right:0}
.view-btns button:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.view-btns button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* ── Content Container ── */
.content{max-width:1200px;margin:0 auto;padding:0 1rem 3rem}

/* ── List View ── */
.day-heading{font-size:1.2rem;color:var(--accent);margin:1.5rem 0 0.75rem;padding-bottom:0.35rem;border-bottom:2px solid var(--accent)}
.time-slot-heading{font-size:0.9rem;color:var(--accent2);margin:1rem 0 0.5rem;padding:0.3rem 0.6rem;background:var(--surface);border-radius:var(--radius-sm);display:inline-block;scroll-margin-top:70px}
.list-cards{display:grid;grid-template-columns:1fr;gap:0.6rem;margin-bottom:0.5rem}
.card{background:var(--surface);border-radius:var(--radius);padding:0.85rem;border-left:4px solid var(--card-color,#444);cursor:pointer;transition:background 0.1s}
.card:hover{background:var(--surface2)}
.card:active{background:var(--surface3)}
.card-stage{font-size:0.7rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:999px;display:inline-block;margin-bottom:0.35rem;color:var(--card-color);background:color-mix(in srgb,var(--card-color) 15%,transparent)}
.card-title{font-size:0.95rem;font-weight:600;color:#fff;margin-bottom:0.25rem;line-height:1.3}
.card-speakers{font-size:0.8rem;color:var(--text2);margin-bottom:0.25rem}
.card-desc{font-size:0.78rem;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.4rem}
.card-tag{font-size:0.65rem;background:var(--surface3);color:var(--text2);padding:0.15rem 0.4rem;border-radius:999px}
.card-lang{font-size:0.65rem;padding:0.15rem 0.4rem;border-radius:999px}
.lang-en{background:#1a3a2a;color:#4CAF50}
.lang-es{background:#3a2a1a;color:#FF9800}
.lang-ca{background:#1a2a3a;color:#2196F3}

/* ── Calendar View ── */
.cal-wrapper{overflow-x:auto;overflow-y:auto;max-height:85dvh;-webkit-overflow-scrolling:touch;border:1px solid #222;border-radius:var(--radius);background:var(--surface);margin-bottom:1.5rem;cursor:grab}
.cal-wrapper.dragging{cursor:grabbing;user-select:none}
.cal-grid{position:relative;min-width:600px}
.cal-header{position:sticky;top:0;z-index:10;display:flex;background:var(--surface);border-bottom:1px solid #333}
.cal-header-corner{width:50px;min-width:50px;height:40px;background:var(--surface)}
.cal-stage-hdr{height:40px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;text-align:center;padding:0 4px;line-height:1.15;cursor:pointer;transition:opacity 0.15s;user-select:none}
.cal-stage-hdr:hover{opacity:0.7}
.cal-hidden-bar{display:flex;align-items:center;gap:0.35rem;padding:0.3rem 0.5rem;background:var(--surface2);border-bottom:1px solid #333;flex-wrap:wrap}
.cal-hidden-label{font-size:0.7rem;color:var(--text3)}
.cal-body{position:relative}
.cal-time-label{position:sticky;left:0;z-index:5;width:50px;font-size:0.7rem;color:var(--text3);text-align:right;padding-right:6px;background:var(--surface)}
.cal-gridline{position:absolute;height:1px;background:#1e1e1e;pointer-events:none}
.cal-now-line{position:absolute;height:1px;background:#E74C3C99;z-index:0;pointer-events:none}
.cal-past{opacity:0.35}
.cal-ongoing{opacity:0.55}
.cal-now-line::before{content:"";position:absolute;left:-8px;top:-3px;width:6px;height:6px;border-radius:50%;background:#E74C3C99}
.cal-stageline{position:absolute;width:1px;background:#1e1e1e;pointer-events:none}
.cal-ev{position:absolute;overflow:hidden;padding:3px 5px;border-radius:4px;cursor:pointer;font-size:0.63rem;line-height:1.2;z-index:1;transition:filter 0.1s;word-break:break-word}
.cal-ev:hover{filter:brightness(1.5);z-index:5;outline:1px solid rgba(255,255,255,0.4)}
.cal-ev b{display:block;overflow:hidden}
.cal-ev .ev-spk{opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Timeline View ── */
.tl-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #222;border-radius:var(--radius);background:var(--surface);cursor:grab}
.tl-wrapper.dragging{cursor:grabbing;user-select:none}
.tl-grid{position:relative}
.tl-header{position:sticky;top:0;z-index:10;display:flex;background:var(--surface);border-bottom:1px solid #333}
.tl-header-corner{min-width:100px;height:30px;background:var(--surface)}
.tl-time-hdr{height:30px;display:flex;align-items:center;justify-content:flex-start;font-size:0.65rem;color:var(--accent2);font-weight:700;border-left:1px solid #222;padding-left:4px}
.tl-body{position:relative}
.tl-row{position:relative;border-bottom:1px solid #1a1a1a}
.tl-row-label{position:sticky;left:0;z-index:5;width:100px;min-width:100px;font-size:0.65rem;font-weight:700;padding:0 6px;background:var(--surface);display:flex;align-items:center;height:100%}
.tl-ev{position:absolute;border-radius:var(--radius-sm);padding:0 0.25rem;cursor:pointer;font-size:0.68rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;transition:filter 0.1s}
.tl-ev:hover{filter:brightness(1.3)}
.tl-ev.hidden-session{opacity:0.3;border-style:dashed}
.tl-past{opacity:0.35}
.tl-ongoing{opacity:0.55}
.tl-legend{display:flex;flex-wrap:wrap;gap:8px 16px;padding:8px 12px;font-size:0.7rem;color:#aaa}
.tl-gridline{position:absolute;width:1px;background:#1e1e1e;pointer-events:none}
.tl-now-line{position:absolute;width:1px;background:#E74C3C99;z-index:0;pointer-events:none}
.tl-now-line::before{content:"";position:absolute;top:-3px;left:-3px;width:6px;height:6px;border-radius:50%;background:#E74C3C99}

/* ── Modal ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;justify-content:center;align-items:flex-end}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface2);border-radius:var(--radius) var(--radius) 0 0;padding:1.25rem;width:100%;max-height:85dvh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:0.6rem;right:0.75rem;background:none;border:none;color:var(--text3);font-size:1.5rem;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:#fff}
.modal-hide-btn{right:2.75rem}
.modal-stage{font-size:0.75rem;font-weight:700;padding:0.2rem 0.65rem;border-radius:999px;display:inline-block;margin-bottom:0.5rem}
.modal-title{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:0.35rem;padding-right:2rem}
.modal-time{font-size:0.85rem;color:var(--accent2);margin-bottom:0.75rem}
.modal-speakers{margin-bottom:0.75rem;line-height:1.7}
.modal-speaker-name{font-weight:600;color:#fff}
.modal-speaker-role{color:var(--text2);font-size:0.85rem}
.modal-desc{font-size:0.88rem;color:var(--text2);line-height:1.6;margin-bottom:0.75rem}
.modal-meta{display:flex;gap:0.5rem;flex-wrap:wrap}
.modal-meta span{font-size:0.75rem;padding:0.2rem 0.5rem;border-radius:999px;background:var(--surface3);color:var(--text2)}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface2);color:#fff;padding:0.6rem 1.2rem;border-radius:var(--radius-sm);font-size:0.85rem;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ── Responsive ── */
@media(max-width:767px){
  .filter-toggle{display:inline-flex;align-items:center}
  .filter-panel{display:none;padding:0.5rem 1rem}
  .filter-panel.open{display:flex}
  .topbar-inner{gap:0.35rem;flex-wrap:wrap}
  .search-box{max-width:100%;order:11;flex:1 1 100px;min-width:80px;margin-left:auto;height:30px;font-size:0.75rem}
  .show-hidden-toggle{order:9}
  .help-link{order:10;width:30px;height:30px;font-size:0.8rem}
  .dropdown-btn,.day-toggle button,.view-btns button,.show-hidden-toggle{font-size:0.7rem;padding:0.25rem 0.4rem;height:30px}
}
@media(min-width:768px){
  .list-cards{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
  .modal-backdrop{align-items:center}
  .modal{max-width:560px;border-radius:var(--radius);max-height:80vh}
  .topbar h1{font-size:1.25rem}
}
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="day-toggle">
      <button data-day="3" onclick="setDay(this)">Mar 3</button>
      <button data-day="4" onclick="setDay(this)">Mar 4</button>
    </div>
    <div class="view-btns">
      <button data-view="list" onclick="setView('list')">List</button>
      <button data-view="calendar" onclick="setView('calendar')">Cal</button>
      <button data-view="timeline" onclick="setView('timeline')">TL</button>
    </div>
    <div class="dropdown" id="stageDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('stageDropdown')"><span class="label">Stages</span> <span id="stageLabel">All</span></button>
      <div class="dropdown-menu" id="stageMenu"></div>
    </div>
    <div class="dropdown" id="tagDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('tagDropdown')"><span class="label">Topics</span> <span id="tagLabel">All</span></button>
      <div class="dropdown-menu" id="tagMenu"></div>
    </div>
    <div class="dropdown" id="langDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('langDropdown')"><span class="label">Lang</span> <span id="langLabel">All</span></button>
      <div class="dropdown-menu" id="langMenu"></div>
    </div>
    <button class="show-hidden-toggle" id="showHiddenBtn" onclick="toggleShowHidden()">Hidden</button>
    <button class="show-hidden-toggle" id="restoreAllBtn" onclick="restoreAll()" style="display:none">Restore all</button>
    <input type="text" class="search-box" id="searchBox" placeholder="Search..." oninput="applyFilters()" onkeydown="if(!this._typed){this.select();this._typed=true}" onfocus="this._typed=false">
    <a href="help.html" class="help-link" title="Help">?</a>
  </div>
</div>
<div class="filter-panel" id="filterPanel" style="display:none"></div>

<!-- ── Content ── -->
<div class="content" id="content"></div>
<div style="max-width:1200px;margin:0 auto;padding:0.5rem 1rem 1.5rem;text-align:center"><span class="stats" id="stats"></span></div>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close modal-hide-btn" id="modalHideBtn" onclick="">&minus;</button>
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Data ──
const SESSIONS = [{"day":3,"time":"09:30-10:00","stage":"XPRO stage","title":"It’s not just another bot: it’s an inspirational agent for the shopping of the future","speakers":[{"name":"Omar Elias Rodriguez Nazar","role":"Technical Architect at Vueling"}],"description":"The next generation of shopping will go beyond web and apps: it will live in an interoperable agentic ecosystem. We introduce Vueling’s Inspirational Agent, an agentic architecture with MCPs and MCPApps, integrable into owned channels or external environments. We explain context design, coordination, and tool-calling over core systems, ensuring observability, security, governance, and controlled costs—laying the foundation today for the agentic world of tomorrow.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["Vueling"],"company":"Vueling","short":"AI Shopping Agent"},{"day":3,"time":"09:30-10:00","stage":"Visionary Stage","title":"New Quantum Materials for Quantum 2.0","speakers":[{"name":"Pablo Jarillo-Herrero","role":"Cecil and Ida Green Professor of Physics"}],"description":"The birth of Quantum Physics in the early 20th century gave rise to all modern technology. This first “Quantum Revolution” made use of the most basic concepts in quantum physics. In the coming decades, a second quantum revolution (Quantum 2.0), using much more advanced quantum physics, will dramatically change the way we do science and technology, with dramatic implications for the economy and national security. In his talk, Prof. Jarillo-Herrero will discuss a new generation of quantum materials with the potential to revolutionize quantum simulations, quantum sensing, and AI applications","tags":["Future Trends"],"lang":"English","companies":["MIT"],"company":"MIT","short":"Next-Generation Quantum Materials"},{"day":3,"time":"09:30-10:30","stage":"Meetup area","title":"Talent, AI, and Productivity in Software Engineering","speakers":[{"name":"Luis Delgado Schwarzmann Jimenez","role":"Managing Director at CaixaBank Tech"}],"description":"Luis Delgado Schwarzmann Jimenez – Managing Director at CaixaBank Tech","tags":["Software Development"],"lang":"Spanish","companies":["CaixaBank Tech"],"company":"CaixaBank Tech","short":"How AI Boosts Developer Productivity"},{"day":3,"time":"09:30-10:30","stage":"Hotspot Talks","title":"Onboarding Claude Code: from babysitting to autonomous agents","speakers":[{"name":"Kate Marshalkina","role":"Staff Software Engineer at Datavant"}],"description":"A 90-day onboarding playbook for an AI coding agent in real-world repos: complex domain logic, legacy migrations, low test coverage, outdated docs. From day-one setup – where you review every line – through guardrails and context management, to autonomous agents that can own your repo while you tackle the problems no one’s solved yet.","tags":["Software Development"],"lang":"English","companies":["Datavant"],"company":"Datavant","short":"Claude Code: From Basics to Autonomous Agents"},{"day":3,"time":"09:30-10:30","stage":"Plug-in Talks","title":"Closing the Velocity Gap: Syncing AI and Innovation with Healthcare Adoption","speakers":[{"name":"Nicole Arbiv","role":"Strategic Programs Leader at Roche (Moderator)"},{"name":"Alex Morcillo","role":"Senior Manager IT Products Architecture at Roche"},{"name":"Laura Vidal Borrell","role":"Global Director Portfolio and Product Management at Roche"}],"description":"AI and digital technologies are advancing at unprecedented speed, yet healthcare adoption often lags due to regulatory, cultural, and operational constraints. This talk explores the “velocity gap” between innovation and real-world impact, drawing on experience from Roche to share practical insights on governance, cross-functional collaboration, and execution strategies that turn AI into sustainable value for patients and healthcare professionals","tags":["Artificial Intelligence"],"lang":"English","companies":["Roche"],"company":"Roche","short":"AI Innovation Adoption in Healthcare Systems"},{"day":3,"time":"09:30-10:30","stage":"XPRO Talks","title":"Data, Governance, and Technology as Key Ingredients","speakers":[{"name":"Guillermo Prieto","role":"Director of Information Technologies"},{"name":"Albert Del Baño","role":"Head of IT Operations"},{"name":"Adriana López-Doriga Guerra","role":"Data Architect atNennisiwok"}],"description":"Damm drives a Data and AI strategy based on the IAmm Hub, created to accelerate projects and generate value. Its key pillars are Data Governance, essential for ensuring quality and security, and a flexible, robust technology platform. The talk will showcase the current status, key learnings, and challenges in scaling a reliable and adaptable ecosystem.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["CaixaBank Tech","Nennisiwok"],"company":"CaixaBank Tech","short":"Data Governance and Tech Infrastructure"},{"day":3,"time":"09:30-11:00","stage":"Focus Lab","title":"Creating a Real Product with AI: Professional Vibe Coding for Developers","speakers":[{"name":"Miguel Ángel Duran (MiduDev)","role":"Software Engineer and Programming Content Creator"}],"description":"In this workshop we will build a functional product from scratch, using artificial intelligence tools as real engineering accelerators.This is not about asking a model for code and copying it. It’s about designing, deciding, and building better. During the session we will work with tools such as Stitch to structure and rapidly prototype the experience, Claude Code and Open Code to iterate on architecture and business logic, and Antigravity to explore agent-assisted workflows. We will also see how to run models directly in the browser using ONNX, integrating AI capabilities into the product itself without relying exclusively on the backend. Throughout the process we will cover: Defining architecture with AI support without delegating technical judgment Validating and refactoring model-generated code Designing AI-powered user experiences Integrating models in the frontend and understanding their real limitations What changes in the role of the senior developer when code generation is almost instantaneous? AI does not replace the developer. It multiplies them — but only if they know how to use it. This workshop is aimed at experienced developers who want to understand how to integrate AI into their professional workflow, improve their delivery capacity, and redefine their value in the era of intelligent assistants.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["MiduDev"],"company":"MiduDev","short":"Professional Vibe Coding with AI"},{"day":3,"time":"09:30-11:00","stage":"Frontier lab","title":"Talent and Disability: Breaking Barriers and Driving Inclusion in the AI Era","speakers":[{"name":"Sílvia Sousa Cristòfol","role":"Strategy and Transformation Director at SEIDOR / Directora d’Estratègia i Transformació a SEIDOR"},{"name":"Javier Pascual Gurpegui","role":"People, Organization and e-Administration Manager at Ajuntament de Barcelona / Gerent de Persones, Organització i Administració Electrònica a l’Ajuntament de Barcelona"},{"name":"Ernest Pla Martínez","role":"Global VP of Talent & Organization at Grifols / Vicepresident Global de Talent i Organització a Grifols"},{"name":"Albert Campabadal","role":"President at Grupo SIFU / President a Grupo SIFU"},{"name":"Sandra Alonso","role":"Program Leader at Eurofirms Foundation / Responsable de Programa a Eurofirms Foundation"}],"description":"Join this inspiring and co-creative session where we will bring together people with disabilities, talent teams, and experts from various organizations to explore how to drive inclusion and break down barriers to employment. In a hands-on session, with inspiring testimonies and collaborative activities, we will design solutions to enhance inclusion and amplify abilities through technology. Come help humanize the future!","tags":[],"lang":"Spanish","companies":["SEIDOR / Directora d’Estratègia i Transformació a SEIDOR","Ajuntament de Barcelona / Gerent de Persones, Organització i Administració Electrònica a l’Ajuntament de Barcelona","Grifols / Vicepresident Global de Talent i Organització a Grifols","Grupo SIFU / President a Grupo SIFU","Eurofirms Foundation / Responsable de Programa a Eurofirms Foundation"],"company":"SEIDOR / Directora d’Estratègia i Transformació a SEIDOR","short":"Disability Inclusion in AI-Era Workforce"},{"day":3,"time":"09:30-11:00","stage":"XPRO Lab","title":"Build Your First AI Model in Under 60 Minutes – From Zero to Deployed","speakers":[{"name":"Louis Moreau","role":"Head of Developer Relations at Edge Impulse"},{"name":"Jim Bruges","role":"Senior Developer Relations Engineer at Edge Impulse"},{"name":"Marc Pous","role":"Developer Relations Staff Engineer at Edge Impulse"}],"description":"Join us for a hands-on workshop where you’ll learn how to train and deploy your first Machine Learning model using Edge Impulse. Designed for beginners and experienced developers, the session covers data collection, model training, and deployment on edge devices. You’ll build an end-to-end real-time Object Detection application running directly on hardware. No prior ML experience required—just bring your laptop and curiosity!","tags":["Software Development"],"lang":"English","companies":["Edge Impulse"],"company":"SEIDOR","short":"Build and Deploy AI Model in 60 Minutes"},{"day":3,"time":"09:45-10:15","stage":"Robotics","title":"Building complex code-defined AI agents that execute robotic actions","speakers":[{"name":"Enric Domingo","role":"Principal Data & AI Engineer at ERNI"}],"description":"In this session, we will break open the black box of language model–based agents (LLMs) to understand how they are built and connected. We will also explore how these agents can go beyond simply answering questions with text, performing real-world actions that are automatically executed by a robotic arm.","tags":["ROBOTICS"],"lang":"Catalan","companies":["ERNI"],"company":"ERNI","short":"Code-Defined AI Agents for Robotics"},{"day":3,"time":"10:00-10:30","stage":"Visionary Stage","title":"Quantum Sensors: The Technology That Measures the Impossible","speakers":[{"name":"José Luis Crespo","role":"Physicist, science communicator and creator of the podcast \"Quantum Fracture\""}],"description":"When people talk about quantum technology, almost all the attention goes to quantum computers, presented as the great revolution of the future. But they are not the only one, nor necessarily the most influential. This talk focuses on a silent revolution already underway: quantum sensors. Through atomic clocks and SQUIDs, it combines scientific explanation with real-world anecdotes to show how quantum physics has moved from theory to measuring the impossible.","tags":["Future Trends"],"lang":"Spanish","companies":["Quantum Fracture"],"company":"Quantum Fracture","short":"Quantum Sensors: Measuring Impossibilities"},{"day":3,"time":"10:00-10:30","stage":"XPRO stage","title":"Another bot? No: an architecture","speakers":[{"name":"Manuel José Mora","role":"AI Expert at Banco de España"}],"description":"As demand for chatbots grows, creating isolated assistants becomes unsustainable. Our solution is an agent‑based architecture with a single entry point, MIA, which autonomously determines what each user can access based on their profile. By orchestrating specialized agents, MIA ensures scalability, consistency, and a more controlled, efficient user experience.","tags":["Software Development"],"lang":"Spanish","companies":["Banco de España"],"company":"Banco de España","short":"Beyond Bots: AI Architecture Design"},{"day":3,"time":"10:00-11:00","stage":"Skills Hub","title":"Immersive Interview Experience: Live a Real Interview","speakers":[],"description":"The job interview is a demanding process that requires preparation and strategy. Through a hands-on, “training mode” experience, participants can practice, improve their pitch, and gain confidence to perform at their best in a real interview. In this workshop, you will find the most realistic simulator to help you avoid mistakes in an actual job interview.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Live Interview Experience"},{"day":3,"time":"10:30-11:00","stage":"Visionary Stage","title":"Learning at the Speed of AI: Upskilling and the Future of Learning","speakers":[{"name":"Timothy Serewicz","role":"Vice President of Education at The Linux Foundation"}],"description":"The evolving role of upskilling in a landscape where traditional knowledge providers (universities, training companies) coexist with self-service models, pre-packaged courses, and AI-powered learning assistants.","tags":["Cloud Computing"],"lang":"English","companies":["The Linux Foundation"],"company":"The Linux Foundation","short":"Upskilling at the Speed of AI"},{"day":3,"time":"10:30-11:00","stage":"XPRO stage","title":"From Measurement to Intelligence: Server-Side Strategy in the Cookieless Era","speakers":[{"name":"Anna Buron","role":"Senior Product Owner - Data & Analytics at MediaMarkt"}],"description":"How can you personalize at scale without compromising customer trust? MediaMarkt will show how their server-side strategy allows them to control, protect, and activate first-party data to drive AI, secure personalization, and relevant real-time experiences. A hands-on session to understand what it truly means to be data-driven today, shift your mindset, and leave with a clear vision for designing strategies ready for the digital future.","tags":["Software Development"],"lang":"Spanish","companies":["MediaMarkt"],"company":"MediaMarkt","short":"Server-Side Strategy in Cookieless Era"},{"day":3,"time":"10:30-11:00","stage":"Gaming","title":"Do’s & Don’ts for your Indie game","speakers":[{"name":"Virgilio Cortez","role":"Founder at Hyper Three Studios"}],"description":"Lessons learned from our latest title:Tiny Lands 2.","tags":["GAMING"],"lang":"English","companies":["Hyper Three Studios"],"company":"Hyper Three Studios","short":"Indie Game Tips"},{"day":3,"time":"10:30-11:30","stage":"Meetup area","title":"Shape Your Future: Explore Sage’s Graduate Programme","speakers":[{"name":"Julie Boulanger","role":"Learning Experience Specialist at Sage"},{"name":"Blanca Miguel Casanovas","role":"UX Designer at Sage"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Sage"],"company":"Sage","short":"Sage Graduate Programme"},{"day":3,"time":"10:30-11:30","stage":"XPRO Talks","title":"The AI-Ready Workforce: Who Thrives, Who Survives?","speakers":[{"name":"Marcela Mogilska","role":"Founder & Managing Director at Radia (moderator)"},{"name":"Rosario Sierra","role":"Talent Solutions Leader at LinkedIn Iberia"},{"name":"Irene Rodríguez Puig","role":"Chief People Officer at Paack"},{"name":"Iulia Crai","role":"Head of Talent Acquisition at Superhuman"},{"name":"Andreea Lungulescu","role":"The Principal Recruiter / Talent Crunch – Berlin Founder"}],"description":"","tags":["Management"],"lang":"English","companies":["Radia","LinkedIn Iberia","Paack","Superhuman","Talent Crunch"],"company":"LinkedIn","short":"Building an AI-Ready Workforce"},{"day":3,"time":"10:30-11:30","stage":"Hotspot Talks","title":"How the age of AI and Cloud reshapes prototyping skills","speakers":[{"name":"José A. Rodríguez Serrano","role":"Senior Lecturer & Head of Department at Esade"}],"description":"Compared to a few years ago, developing applications is cheaper and more “commoditized”. We have programming languages with strong ecosystems of libraries, normalized the use of cloud, converged to sharing AI algoritms as a service, and exploited generative AI to save coding time. This changes how companies develop products and reshapes skills like prototyping. This talk reviews implications and examples at the technical and organizational levels.","tags":["Cloud Computing"],"lang":"English","companies":["Esade"],"company":"Esade","short":"AI and Cloud Reshape Prototyping"},{"day":3,"time":"10:30-11:30","stage":"Plug-in Talks","title":"Women influencing and leading the forefront of tech","speakers":[],"description":"As part of Talent Arena, this session brings together three women awarded the DonaTIC Awards, recognized for driving digital talent and paving the way in the STEM ecosystem: Marta Portalés (MWCapital), Alba Cervera Lierta (BSC), and Estel Blay (Associació Hypatia Mars), moderated by Marjorie Grassler (MWCapital). It’s an inspirational conversation that highlights real role models who make an impact and create opportunities for others to succeed. The panel explores how to build a STEM career while navigating data, decisions, and reasonable doubts. The speakers will share the driving forces behind their progress: influences, alliances, and key moments, and how this legacy has translated into innovation, leadership, and new ways of working. The session closes with two simple yet powerful questions: what can you do with this tomorrow? And, above all, who do you want to influence and help grow from now on?","tags":["Management"],"lang":"Catalan","companies":[],"company":"","short":"Women Leaders Shaping Tech Future"},{"day":3,"time":"11:00-11:30","stage":"XPRO stage","title":"From Idea to Product: Rethinking How We Build in the Age of AI","speakers":[{"name":"Emil Sjölander","role":"Director, Software Engineering at Figma"}],"description":"Technology has fundamentally changed almost every part of how we work today. Yet many companies haven’t updated their ways of working. So just how should companies, leaders, and individuals reorganize for this new world?","tags":["Software Development"],"lang":"English","companies":["Figma"],"company":"Figma","short":"Building Products in the AI Age"},{"day":3,"time":"11:00-11:30","stage":"Visionary Stage","title":"What If AI Fails?: A Method for Useful and Human-Centered AI","speakers":[{"name":"Cristina Vázquez Pelegrí","role":"Director of AI Governance – CAIO at Caixabank"}],"description":"","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["Caixabank"],"company":"Caixabank","short":"Human-Centered AI: Building for Failure"},{"day":3,"time":"11:15-11:45","stage":"Robotics","title":"UAB-Cruïlla Chair Robotic Prototypes","speakers":[{"name":"Adrian Gonzalez","role":"Founder at Lopako"}],"description":"In the context of the Chair UAB-Cruïlla, it’s talent program is presenting you 2 robotic prototypes, developed within the context of AI in the Music & Arts field. These projects have been developed and will be presented by the students themselves. They are both creating a strat-up. In addition to helping the students to level up their TRL, the Chair provided a real-life scenario to validate their MPV.","tags":["ROBOTICS"],"lang":"English","companies":["Lopako"],"company":"Lopako","short":"UAB-Cruïlla Robotic Prototypes"},{"day":3,"time":"11:15-12:45","stage":"Focus Lab","title":"Authorship, Identity, and Fan Culture in the AI Era","speakers":[{"name":"Casandra Vicente","role":"Entrepreneur & Ex-Google, ESIC Lecturer - ESIC University"}],"description":"This workshop offers digital leaders and creative professionals an ethical, clear, and practical framework to interpret authorship, ownership, and visual identity in the era of generative AI. We examine who can claim rights over AI-generated content, how AI is transforming current creative processes, and how users generate fan-made images and products inspired by brands and cultural icons. We also address how artists and companies can protect their visual identity without stifling new forms of community-driven creativity. Attendees will gain strategic criteria to manage risks, rights, and cultural integrity.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["ESIC University"],"company":"ESIC University","short":"Authorship and Identity in AI Culture"},{"day":3,"time":"11:15-12:45","stage":"Frontier lab","title":"Giving AI Agents Superpowers: Connecting Them to the Real World with MCP","speakers":[{"name":"Darragh Hoare","role":"Graduate AI Engineer at Sage"},{"name":"Lara Ozdamar","role":"Graduate AI Engineer at Sage"},{"name":"Daniel Seara","role":"Software Engineer Team Leader at Sage"},{"name":"Adria Avellaneda","role":"Software Engineer Team Lead at Sage"}],"description":"","tags":["Cloud Computing"],"lang":"English","companies":["Sage"],"company":"Sage","short":"Empowering AI Agents with Real-World MCP"},{"day":3,"time":"11:15-12:45","stage":"XPRO Lab","title":"The Red Team: The Telco AI Prompt Engineering Challenge – WIn Prizes!","speakers":[{"name":"John David Kim","role":"AI Industry Lead, GSMA APACHead of North East Asia & DX Acceleration Forum at GSMA"},{"name":"Louis Powell","role":"Director of AI Initiatives at GSMA"},{"name":"Michael Hwang","role":"Co-Founder and Chief Strategy Officer at Datumo"},{"name":"Jerry Jae Yeol Kim","role":"Research Fellow in Future Tech & Strategy at LG Uplus | Vice Exec Chair at 6G Forum at LG U+"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["GSMA","Datumo","LG Uplus | Vice Exec Chair at 6G Forum at LG U+"],"company":"GSMA","short":"Telco AI Prompt Engineering Challenge"},{"day":3,"time":"11:30-12:30","stage":"Visionary Stage","title":"Fireside Chat: Tim Berners-Lee","speakers":[{"name":"Tim-Berners Lee","role":"World Wide Web (WEB) Inventor and Winner of the ACM Turing Prize"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["W3C"],"company":"W3C","short":"Fireside Chat with Tim Berners-Lee"},{"day":3,"time":"11:30-12:30","stage":"Meetup area","title":"The community that changed your life (or the one you’re still looking for)","speakers":[{"name":"Isabel Rodríguez Olivar","role":"Business Development at Next Digital"},{"name":"Laura Vignali","role":"Event Lead at Next Digital"}],"description":"","tags":["Software Development"],"lang":"Spanish","companies":["Next Digital"],"company":"Next Digital","short":"Community That Changed You"},{"day":3,"time":"11:30-12:30","stage":"Plug-in Talks","title":"Hard-Earned Truths About Shipping GenAI on the Factory Floor","speakers":[{"name":"Juan Aguila","role":"Head of AI for HP Industrial"}],"description":"In this talk I’ll share the hard-earned truths from applying GenAI in production for manufacturing at HP: where it actually delivers value, where it breaks (data, integration, latency, reliability, safety/compliance, culture and adoption), and what we changed in our approach to make it usable for operators and engineers.","tags":["Management"],"lang":"English","companies":["HP"],"company":"HP","short":"GenAI Deployment in Manufacturing"},{"day":3,"time":"11:30-12:30","stage":"XPRO Talks","title":"Python on Android – How to combine the uncombinable?","speakers":[],"description":"Follow me on three ways how to integrate a python hardware security module library into your Android app. I) localhost and Termux (🦅🪹) II) translate™️ Python to Kotlin. (😱😱) III) Chaquopy (👀) After scaring the audience with the first two options, I will present the easiest: Chaquopy. Expect an eccentric mix of Python and Kotlin, all to make the most secure Android App possible.","tags":["Software Development"],"lang":"English","companies":[],"company":"","short":"Running Python on Android Devices"},{"day":3,"time":"11:30-12:30","stage":"Hotspot Talks","title":"PLAI – Data and AI Democratization at Sanofi","speakers":[],"description":"Meet PLAI, Sanofi’s decision intelligence platform that turns complex data into snackable, real time insights across R&D, Clinical Ops, M&S, Quality, Finance and GTM. With AI Agents—including Super Agent—PLAI helps teams anticipate, simulate what ifs, and act with confidence. Discover how human + AI collaboration is cutting noise, speeding decisions, and opening a new era of intelligent operations.","tags":["Artificial Intelligence"],"lang":"English","companies":[],"company":"Sanofi","short":"Democratizing Data and AI at Scale"},{"day":3,"time":"11:30-12:30","stage":"Barcelona","title":"Women Talent in the Tech Sector","speakers":[],"description":"The tech sector offers opportunities for women talent to grow. This discussion focuses on programs that open doors to new careers, communities that connect women with role models and real support, and companies driving transformative initiatives. Through experiences and best practices, it will show how to inspire vocations, strengthen careers, and foster a more diverse and future-ready tech sector.","tags":["Management"],"lang":"Catalan","companies":[],"company":"","short":"Women Talent in Technology"},{"day":3,"time":"11:30-12:30","stage":"Skills Hub","title":"Decode Yourself: Discover Your DISC Style and Improve How You Work","speakers":[],"description":"The DISC model identifies four behavioral styles that influence how we make decisions, communicate, and face challenges. Understanding them improves teamwork, professional effectiveness, and interpersonal relationships, helping individuals gain better self-awareness and respond appropriately in any situation. A workshop designed to help participants decode themselves through DISC.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"DISC Personality Discovery"},{"day":3,"time":"12:00-12:30","stage":"Gaming","title":"Everyday objects as game mechanics","speakers":[{"name":"Carlos Martinez","role":"CEO at Dust Games"}],"description":"Some of the most memorable game mechanics are inspired by the simplest things around us.","tags":["GAMING"],"lang":"English","companies":["Dust Games"],"company":"Dust Games","short":"Game Mechanics from Everyday Objects"},{"day":3,"time":"12:30-13:00","stage":"Visionary Stage","title":"From Data to Impact: How AI @Roche Is Rewriting Healthcare","speakers":[{"name":"Erez Kestenband","role":"Global Head Architecture and Software at Roche"}],"description":"AI is no longer a future promise in healthcare, it’s driving transformation today. At Roche, AI is being embedded across the healthcare value chain, turning complex data into actionable clinical and operational impact. This keynote shares real-world use cases, lessons learned, and the organizational mindset needed to scale AI from experimentation to measurable outcomes.","tags":["Artificial Intelligence"],"lang":"English","companies":["Roche"],"company":"Roche","short":"AI Impact in Healthcare at Roche"},{"day":3,"time":"12:30-13:00","stage":"XPRO stage","title":"Engineering in the Age of AI – Why Fundamentals Matter More Than Ever","speakers":[{"name":"Sergi Falcon","role":"Software Engineer at Porsche Digital"}],"description":"Artificial Intelligence is reshaping how software is built and learned. While AI boosts productivity, it also brings risks like shallow understanding and over-reliance. In this session, Porsche Digital engineers share how to use AI as a co-pilot, where it adds value, and why strong fundamentals remain essential.","tags":["Artificial Intelligence"],"lang":"English","companies":["Porsche Digital"],"company":"Porsche Digital","short":"AI Engineering Fundamentals"},{"day":3,"time":"12:30-13:30","stage":"Meetup area","title":"DonesTIC Community: inspiration, connections, and community in a single gathering","speakers":[{"name":"Tara Chklovski","role":"Founder & CEO of Technovation"}],"description":"Tara Chklovski – Founder & CEO of Technovation","tags":["Management"],"lang":"Catalan","companies":["Technovation"],"company":"Technovation","short":"DonesTIC Community Connections"},{"day":3,"time":"12:30-13:30","stage":"Hotspot Talks","title":"A holistic view of artificial intelligence","speakers":[{"name":"Antonio Serrano Acitores","role":"Universidad Rey Juan Carlos – Coordinador de Digitalización, Innovación y Comunicación"},{"name":"Elena González-Blanco García","role":"Microsoft – Head of AI for Digital Natives in EMEA"},{"name":"Cristina Casado Cañeque","role":"Fundación Formación y Futuro – Deputy Executive Director (Moderadora)"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["Universidad Rey Juan Carlos","Microsoft","Fundación Formación y Futuro"],"company":"Microsoft","short":"Holistic Perspective on AI"},{"day":3,"time":"12:30-13:30","stage":"Plug-in Talks","title":"Managing full infrastructure with GitOps and Crossplane","speakers":[{"name":"Pere  Alcoberro Turu","role":"Head of Platform Engineering of BMP Claims and Retail at Allianz"}],"description":"Allianz Technology aims to unify its Platform Engineering model to reduce complexity and enhance developer experience globally. Addressing fragmented tooling and complex pipelines, the strategy proposes a hierarchical architecture using GitOps, Argo CD, and Crossplane. It focuses on a multi-tenant Internal Developer Platform with clear responsibilities, reusable APIs, centralized governance, and secure automation for faster, safer delivery.","tags":["Software Development"],"lang":"English","companies":["Allianz"],"company":"Allianz","short":"GitOps and Crossplane Infrastructure"},{"day":3,"time":"12:30-13:30","stage":"XPRO Talks","title":"The Final Frontier with the Digital Twin","speakers":[{"name":"Marta Gascón Corella","role":"Senior Manager Business Analytics Area at NTT Data"}],"description":"The Final Frontier with the Digital Twin. Have We Reached the Limit of Current Technology?","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["NTT Data"],"company":"NTT Data","short":"Digital Twin Technology"},{"day":3,"time":"12:30-13:30","stage":"Barcelona","title":"Discover In-Demand Profiles and Connect with Companies","speakers":[{"name":"Rosaura Alastruey (moderator)","role":"Networking Facilitator at Rosaura Alastruey and Barcelona Activa"},{"name":"Maria Barragan","role":"Organizational Change Management at SIRT"},{"name":"Emili Bonilla Ardévol","role":"Partner at Propelling Tech"},{"name":"Emma Urbina","role":"CEO and Co-founder at Jotavirtual"},{"name":"Isabel Comas Segarra","role":"Coordinator of Career Services and Guidance Programs at Barcelona Activa"}],"description":"With the participation of companies, discover which digital profiles are most in demand, which skills are key, and which trends dominate the sector. The session includes guided networking, allowing you to make direct contacts with companies. An experience to guide you, help you learn, and boost your digital career.","tags":["Management"],"lang":"Catalan","companies":["Rosaura Alastruey and Barcelona Activa","SIRT","Propelling Tech","Jotavirtual","Barcelona Activa"],"company":"Rosaura Alastruey and Barcelona Activa","short":"Connecting Talent with Employers"},{"day":3,"time":"12:45-13:15","stage":"Robotics","title":"The New Era of Social Robotics: Turning Vision into Real-World Impact","speakers":[{"name":"Jordi Cabau","role":"CTO at Group Saltó"}],"description":"Robotics is no longer a promise of the future, it’s a real-world driver of change. In this talk, Group Saltó’s CTO shares how we design and deploy applied robotic solutions, presenting the biggest active project in social robotics for the elderly. Explore the challenges and emerging horizons shaping the next generation of robotics.","tags":["ROBOTICS"],"lang":"English","companies":["Group Saltó"],"company":"Group Saltó","short":"Social Robotics in Real World"},{"day":3,"time":"13:00-13:30","stage":"XPRO stage","title":"Europe’s moment to rise and finish the digital single market","speakers":[{"name":"Marietje Schaake","role":"Non-resident Fellow at Stanford's Cyber Policy Center and at the Institute for Human-Centered AI"}],"description":"Technology is a critical tool in the toolbox of geopolitical actors. Some companies are global players in their own right. Tech should be understood through a lense of power. Power to enjoy self-determination and sovereignty, power to innovate and grow, and power to defend or attack. The challenges of European tech dependencies can be shaped into a spectacular opportunity.","tags":["Cybersecurity"],"lang":"English","companies":["Stanford's Cyber Policy Center and at the Institute for Human-Centered AI"],"company":"Stanford's Cyber Policy Center and at the Institute for Human-Centered AI","short":"EU Digital Single Market"},{"day":3,"time":"13:00-13:30","stage":"Visionary Stage","title":"From Brew to Breakthrough: Accelerating Innovation with AI","speakers":[{"name":"Laura Gil","role":"Chief Data and Digital Officer at Damm"}],"description":"For over 150 years, Damm has driven innovation, and today AI accelerates the entire process from concept to prototype. The session will show how AI transforms ideation, design, testing, and validation, with practical examples of tools that reduce time‑to‑market and blend tradition with cutting‑edge technology","tags":["Artificial Intelligence"],"lang":"English","companies":["Damm"],"company":"Damm","short":"Accelerating Innovation with AI"},{"day":3,"time":"13:00-14:00","stage":"Skills Hub","title":"Back to Your Future: get ready for the tech market","speakers":[{"name":"Javier Martínez","role":"Leader – Claire Joster Technology en Claire Joster"},{"name":"José María Flores","role":"Regional Leader – Madrid en Claire Joster"},{"name":"Jordi Llahí","role":"Sales and Marketing Leader en Claire Joster"},{"name":"Jordi Valls","role":"Senior Consultant 360 en Claire Joster"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Claire Joster"],"company":"Claire Joster","short":"Tech Job Market Preparation"},{"day":3,"time":"13:00-14:30","stage":"XPRO Lab","title":"Quickstart eBPF: Boosting Metrics and Security in Kubernetes","speakers":[{"name":"Timothy Serewicz","role":"Vice President of Education at The Linux Foundation"}],"description":"Dive into the power of eBPF with this hands-on quickstart workshop, designed to equip you with essential skills for enhancing observability and protection in Kubernetes environments. You’ll learn how eBPF enables kernel-level metrics collection, allowing real-time insights into pod performance, network traffic, and resource usage. Explore eBPF’s security applications, including runtime threat detection, access control enforcement, and anomaly monitoring.The workshop exercise will be conducted using Ubuntu 24.04. Students may use a local VM or a cloud instance as desired. If using a cloud instance, please test that you can access your cloud instance via PuTTY (Windows) or a terminal (Linux/Mac) before the session.","tags":["Cloud Computing"],"lang":"English","companies":["The Linux Foundation"],"company":"The Linux Foundation","short":"eBPF for Kubernetes Metrics"},{"day":3,"time":"13:00-14:30","stage":"Focus Lab","title":"Beyond AI: the skills that make you employable by 42 Barcelona","speakers":[{"name":"Cristina Fernández","role":"UX and Educational Innovation at 42 Barcelona Fundación Telefónica"}],"description":"The future of work is already here. AI, digitalization, and cybersecurity are transforming the job market. In this interactive workshop, we’ll explore the most in-demand skills for 2025 and 2030 according to the World Economic Forum and put them to the test in real time. Is learning to code still relevant in the age of AI? Join the 42 Barcelona team and discover how to boost your talent and stand out in the tech revolution.","tags":["Management"],"lang":"Spanish","companies":[],"company":"42 Barcelona","short":"Essential Skills Beyond AI Knowledge"},{"day":3,"time":"13:00-14:30","stage":"Frontier lab","title":"More than a Hack – Final Pitching","speakers":[{"name":"Albert Mundet","role":"General Director at Barça Innovation Hub"}],"description":"Barça Innovation Hub, Metrica Sports, and MWCapital have launched “More than a Hack”, a pioneering competition that brings together generative artificial intelligence and real sports data to transform football analytics and tactical decision-making. During this session, the five finalist teams will take the spotlight to present their innovative solutions in front of a distinguished jury of industry experts and general audience.","tags":["Software Development"],"lang":"English","companies":["Barça Innovation Hub"],"company":"Barça Innovation Hub","short":"Hackathon Final Pitching Session"},{"day":3,"time":"13:30-14:00","stage":"XPRO stage","title":"Model Context Protocol: the standard bridge between generative AI and the world","speakers":[{"name":"Carlos Milán Figueredo","role":"Principal Solutions Architect at AWS"}],"description":"Aware of how data quality, function calling and agents have expanded the potential of generative AI, Anthropic released the Model Context Protocol (MCP), a model-agnostic open source framework that standardizes context exchange and actions between generative AI models and any software, such as cloud providers, databases, applications, filesystems, SaaS, frameworks… What does MCP enable today? What does it mean for the business? What does it mean for architects and developers? What are the security best practices? Let’s dive deep into the potential it brings to the industry.","tags":["Cloud Computing"],"lang":"English","companies":["AWS"],"company":"AWS","short":"Model Context Protocol Standard"},{"day":3,"time":"13:30-14:00","stage":"Gaming","title":"Why Players Don’t Quit: designing engaging difficulty","speakers":[{"name":"Victor Espin","role":"Co-Founder & Game Designer at 43 Studios"}],"description":"Designing engaging difficulty. Many difficult games fail because they confuse difficulty with frustration. In this talk, we will explore how Hell of an Office builds tension, precision, and repetition without breaking player motivation.","tags":["GAMING"],"lang":"English","companies":[],"company":"43 Studios","short":"Engaging Game Difficulty"},{"day":3,"time":"13:30-14:30","stage":"Visionary Stage","title":"Fireside Chat: Kate Darling","speakers":[{"name":"Kate Darling","role":"Researcher at the Boston Dynamics AI Institute & MIT Media Lab"}],"description":"","tags":["ROBOTICS"],"lang":"English","companies":[],"company":"MIT Media Lab","short":"Fireside Chat with Kate Darling"},{"day":3,"time":"13:30-14:30","stage":"Meetup area","title":"Connect to Elevate: Volunteering Tech Skills for Impact","speakers":[{"name":"Anna Baella","role":"CodeWomen+ ESC at Open Cultural Center"},{"name":"Ly-Ly Janusz","role":"Education & Community Manager at Open Cultural Center"},{"name":"Marta Kjorven","role":"Fundraising Officer at Open Cultural Center"}],"description":"","tags":["Management"],"lang":"English","companies":["Open Cultural Center"],"company":"Open Cultural Center","short":"Tech Volunteering for Social Impact"},{"day":3,"time":"13:30-14:30","stage":"Barcelona","title":"Managing Transformation: How AI Reshapes Health Organizations & Physicians","speakers":[{"name":"Khalid Bouziane","role":"Senior Data Scientist – ASHO"},{"name":"Cristina Morgan","role":"Ferrer – Innovation and CX Lead"},{"name":"Ruth Gumbau","role":"Journalist at Barcelona Health Hub (Moderator)This roundtable explores how AI is transforming healthcare organizations, reshaping clinical workflows, and redefining the role of physicians. Experts will discuss practical adoption, cultural and organizational change, ethics, and how professionals can lead this transition to deliver more efficient, personalized, and patient-centered care."},{"name":"Jordi Guitart","role":"M47 AI COMPANY – VP of Artificial Intelligence Health & Pharma"},{"name":"Ruth Gumbau","role":"Journalist at Barcelona Health Hub (Moderator)"}],"description":"This roundtable explores how AI is transforming healthcare organizations, reshaping clinical workflows, and redefining the role of physicians. Experts will discuss practical adoption, cultural and organizational change, ethics, and how professionals can lead this transition to deliver more efficient, personalized, and patient-centered care.","tags":["Artificial Intelligence"],"lang":"English","companies":["ASHO","Ferrer","Barcelona Health Hub","M47 AI"],"company":"Ferrer","short":"AI Transformation in Healthcare"},{"day":3,"time":"13:30-14:30","stage":"Hotspot Talks","title":"AI Transfer: From Lab to the Global Market","speakers":[{"name":"Jordi Berenguer","role":"Universitat Politècnica de Catalunya – BarcelonaTech (UPC) – Vice-rector for Transfer, Innovation and Entrepreneurship"},{"name":"Karina Gibert i Oliveres","role":"Universitat Politècnica de Catalunya – BarcelonaTech -Dean of the Official College of Computer Engineering of Catalonia and member of the Team Board of IDEAI-UPC (Intelligent Data Science and Artificial Intelligence Research Center)"},{"name":"Carla Gomez Cano","role":"Co-founder of Theker Robotics, with a Bachelor’s degree in Industrial Electronic Engineering (EEBE-UPC) at Theker Robotics"},{"name":"Aina Giral Balletbò","role":"People Business partner at Giesecke + Devrient (G+D)"}],"description":"3. (moderadora) M. José Jiménez Jiménez – Vice-rector for Teaching and Students – Universitat Politècnica de Catalunya – BarcelonaTech (UPC) – Universitat Politècnica de Catalunya","tags":["Artificial Intelligence"],"lang":"Catalan","companies":["Universitat Politècnica de Catalunya","the Official College of Computer Engineering of Catalonia and member of the Team Board of IDEAI-UPC","Theker Robotics","Giesecke + Devrient"],"company":"Universitat Politècnica de Catalunya","short":"From AI Research to Market"},{"day":3,"time":"13:30-14:30","stage":"Plug-in Talks","title":"The Evolution of the Developer’s Role in the Era of Agentic AI","speakers":[],"description":"The emergence of Agentic AI is transforming software development and expanding the impact of the developer’s role. In this conversation between engineers, we will analyze how workflows are changing, which skills are becoming essential, and how to prepare for a reality in which humans and agents work together. A must-attend event for those who want to anticipate the future of development.","tags":["Software Development"],"lang":"Spanish","companies":[],"company":"","short":"Developer Role in AI Era"},{"day":3,"time":"13:30-14:30","stage":"XPRO Talks","title":"From Data Stack Challenges to AI-Ready Scale: Lessons Learned with ClickHouse","speakers":[],"description":"We’ll dive into measurable outcomes achieved across both technical performance and business impact, and close with a forward-looking discussion on current AI and agent-driven initiatives. What’s top of mind as teams prepare their data infrastructure for the next wave of intelligent applications? Join us for practical insights, candid lessons learned, and real-world results.","tags":["Cloud Computing"],"lang":"English","companies":[],"company":"","short":"Scaling AI with ClickHouse"},{"day":3,"time":"14:00-14:30","stage":"XPRO stage","title":"How to Overcome Big Challenges","speakers":[{"name":"Sara García Alonso","role":"Reserve Astronaut & Scientist, Spanish National Cancer Research Center"}],"description":"In this talk, Sara García Alonso shares how curiosity, courage, and perseverance can turn great challenges into opportunities for growth. Drawing from her experience as an oncology researcher and astronaut-in-training, she encourages reflection on the importance of taking risks, learning along the way, and never giving up. A presentation on personal leadership, resilience, and pushing beyond limits.","tags":["Future Trends"],"lang":"Spanish","companies":["CNIO"],"company":"CNIO","short":"Overcoming Major Challenges"},{"day":3,"time":"15:00-15:15","stage":"XPRO stage","title":"From Code to Capability: Unlocking New App Experiences with APIs","speakers":[{"name":"Toyeeb Rehman","role":"Lead Developer at GSMA"}],"description":"Developers already know how to build great apps but what if your apps could verify users instantly, prevent fraud by default, and adapt to real-world network conditions without added complexity? This session introduces Open Gateway and how standardised APIs unlock authentication, security, and network intelligence. Discover what’s newly possible, why it matters, and how it applies across fintech, gaming, AI, and mobility.","tags":["Future Trends"],"lang":"English","companies":["GSMA"],"company":"GSMA","short":"APIs Unlocking App Capabilities"},{"day":3,"time":"15:00-15:30","stage":"Robotics","title":"Robot Autonomy In An Unstructured World","speakers":[{"name":"Calvin Chung","role":"3 Morgan at FieldAI"}],"description":"Field Foundation Models (FFMs) are opening new possibilities for real-world autonomy. FFMs are uniquely designed to build context and experience to anticipate probable outcomes. Rather than requiring vast amounts of data to prepare for every scenario the robot could encounter, FieldAI FFM embraces the uncertainty of unknown environments to make safer and faster decisions with much greater efficiency without maps, GPS or pre-programmed paths.","tags":["ROBOTICS"],"lang":"English","companies":["FieldAI"],"company":"FieldAI","short":"Autonomous Robots in Complex Spaces"},{"day":3,"time":"15:00-16:00","stage":"Visionary Stage","title":"How AI will change the future of chess","speakers":[{"name":"Anna Cramling","role":"Chess Master and Content Creator"}],"description":"For decades, chess players have been terrified about the rise of computers and AI in the chess world. Many have believed that it will end the sport, because if computers are better than humans anyways, what is the point of having humans compete against eachother? This problem was famously raised in 1997 when the reigning world champion Garry Kasaprov lost to deepblue in a chess match. Today, that might seem like nothing unusual, but back then it symbolized that machines could excel at complex strategic tasks once thought to be uniquely human. Although many still fear what the future of a sport characterized by human intelligence holds in a world of computers, it is crucial to understand how computers and AI are going to, and already have, revolutionized chess. In many ways, the understanding of this centuries old game, is reaching levels we never thought it could reach. Levels, that would not be possible to reach, without computers. To talk more about this, we have Joost VandeVondole here, who can explain further, how Stockfish completely revolutionized the chess world.","tags":["Software Development"],"lang":"English","companies":["Independent"],"company":"Independent","short":"AI Transforming Chess Future"},{"day":3,"time":"15:00-16:00","stage":"Meetup area","title":"AI at the Edge: Meetup with Qualcomm, Edge Impulse & Arduino","speakers":[{"name":"Louis Moreau","role":"Head of Developer Relations at Edge Impulse"},{"name":"Jim Bruges","role":"Senior Developer Relations Engineer at Edge Impulse"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["Edge Impulse"],"company":"Edge Impulse","short":"Edge AI with Qualcomm and Arduino"},{"day":3,"time":"15:00-16:00","stage":"Skills Hub","title":"Hack Your CV: Key Tips to Optimize Your CV and Beat AI Filters","speakers":[],"description":"In today’s recruitment processes, many résumés are automatically filtered before reaching human hands. Understanding how these systems work is key to improving job opportunities. This workshop provides practical tools and strategies to adapt your CV to AI filters, aiming especially to empower unemployed individuals, people with diverse profiles, or those in vulnerable situations.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"CV Optimization for AI Filters"},{"day":3,"time":"15:00-16:30","stage":"Focus Lab","title":"Boosting productivity with AI: A hands-on workshop","speakers":[{"name":"Antonio Serrano Acitores","role":"Universidad Rey Juan Carlos – Coordinator of Digitalization, Innovation, and Communication"},{"name":"Xavier Jofre Mestre","role":"Fundación Formación y Futuro – Strategy Consultant"},{"name":"Matilde Martínez Casanovas","role":"IGEMA Business School – Managing Director"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["Universidad Rey Juan Carlos","Fundación Formación y Futuro","IGEMA Business School"],"company":"Universidad Rey Juan Carlos","short":"AI Productivity Workshop"},{"day":3,"time":"15:00-16:30","stage":"Frontier lab","title":"Hack Your Brain: Designing Bias-Free Technology","speakers":[{"name":"Margot Matesanz","role":"Engineer and Designer at El Garbell SCCL"}],"description":"Designing quality technology goes far beyond code. This is the core idea of the FemFrame project. In this workshop, you’ll discover why a gender perspective is not an extra, but a key tool to prevent biases, errors, and digital products that don’t work. Through practical exercises and real cases, we’ll explore how the brain makes decisions, how biases are generated, and how they directly impact algorithms, data, software, and digital design. A workshop to hack your way of thinking and create better, fairer, and more efficient technology.","tags":["Software Development"],"lang":"Catalan","companies":["El Garbell SCCL"],"company":"El Garbell SCCL","short":"Designing Bias-Free Technology"},{"day":3,"time":"15:00-18:15","stage":"XPRO Lab","title":"The Quantum Threat: Transitioning to Post-Quantum Security","speakers":[],"description":"Quantum computing is becoming a structural threat to today’s cryptographic backbone. Shor’s algorithm breaks the public-key schemes that secure the web, communications, and cloud. Even before large-scale quantum machines arrive, “harvest now, decrypt later” makes the risk immediate. In this session, we connect the dots from cryptographic fundamentals to the real impact of quantum progress, then walk through the practical shift to post-quantum cryptography: NIST-standardized algorithms, hybrid migration patterns, and what integration looks like in telecom and cloud environments. We also introduce fully homomorphic encryption (FHE), enabling computation directly on encrypted data and closing the long-standing “data-in-use” security gap. We’ll wrap up with a live technical demonstration of encrypted data processing using FHE.","tags":["Cybersecurity"],"lang":"","companies":[],"company":"","short":"Post-Quantum Security Transition"},{"day":3,"time":"15:15-15:30","stage":"XPRO stage","title":"Authentication for the AI Era: Build Passwordless Security in 5 Minutes","speakers":[{"name":"Vasile Granaci","role":"Chief Revenue Officer at Glide Identity"}],"description":"Build stronger authentication without adding friction. Discover a faster, more secure way to verify users beyond SMS codes, using mobile network capabilities to confirm device ownership and reduce fraud risks like SIM swap. Learn how to deliver a seamless, production-ready phone verification flow that works with your existing systems improving security, boosting conversion, and creating a smoother user experience in seconds.","tags":["Future Trends"],"lang":"English","companies":["Glide Identity"],"company":"Glide Identity","short":"Passwordless Auth in 5min"},{"day":3,"time":"15:30-15:45","stage":"XPRO stage","title":"Build Better Apps with Scalable Network Capabilities: Accelerating API Adoption","speakers":[{"name":"Pushpendra Singh","role":"Global Director, Messaging and API Partnerships at Meta"}],"description":"SMS authentication is slow, fragile, and increasingly vulnerable to fraud. In this session, Meta reveals how developers can move beyond one-time codes with API-driven Silent Authentication verifying users securely in the background with no codes required. Learn how it works at the network level, when to replace SMS, and how to integrate a faster, more secure, production-ready login flow that improves security and boosts conversion.","tags":["Future Trends"],"lang":"English","companies":["Meta"],"company":"Meta","short":"Scalable Network APIs for Apps"},{"day":3,"time":"15:30-16:30","stage":"Hotspot Talks","title":"Between Diapers and Deploys: Mothers Compiling the Future of Tech","speakers":[],"description":"A panel discussion exploring how mothers navigate caregiving and a fast-moving cloud career. We’ll discuss the impact of maternity on professional growth, impostor syndrome, work–life balance challenges, and the need for visible female role models. Our goal: show that motherhood and tech can coexist and inspire a more inclusive future.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Women Engineers in Tech"},{"day":3,"time":"15:30-16:30","stage":"Plug-in Talks","title":"CANDELA: The Magic of Creating","speakers":[{"name":"Fernando Vilariño Freire (moderator)","role":"Director at Chair UAB-Cruïlla"}],"description":"What if magic wasn’t fantasy, but technology? We’ve always dreamed of transforming the world with simple gestures. In this presentation, you’ll discover how that ancient desire becomes reality. CANDELA translates gestures into light, sound, and image in real time, removing technical barriers and returning creative control to people. A new way to tell stories and create without limits. by Maria Badji, supported by Cátedra UAB-Cruïlla.","tags":[],"lang":"Spanish","companies":["Chair UAB-Cruïlla"],"company":"Chair UAB-Cruïlla","short":"CANDELA Creative Platform"},{"day":3,"time":"15:30-16:30","stage":"XPRO Talks","title":"How AI is Redefining the Software Lifecycle","speakers":[],"description":"Generative artificial intelligence is transforming software development, from copilots that assist teams to agents capable of executing complex tasks. In this context, AI Engineering emerges, integrating software, data, QA, and MLOps to build reliable and scalable systems. In this roundtable, we will explore real-world experiences and challenges to understand how AI is redefining productivity across the software lifecycle.","tags":["Software Development"],"lang":"Spanish","companies":[],"company":"","short":"AI Redefining Software Development"},{"day":3,"time":"15:30-16:30","stage":"Barcelona","title":"Certified Training to Boost Talent: Partnership Between IT Academy and UPC","speakers":[{"name":"Martí Rodríguez (moderator)","role":"Head of Technological Talent and Innovation at IT Academy-Barcelona Activa"},{"name":"Gerard Campanera","role":"Executive Director, Polytechnic Foundation of Catalonia at UPC"},{"name":"Sara Díaz Roig","role":"Executive Director of Strategic Sectors and Talent at Barcelona Activa"},{"name":"Ana Ferrández","role":"Data Analytics Alumni at Barcelona Activa_IT Academy"}],"description":"","tags":["Management"],"lang":"Catalan","companies":["IT Academy-Barcelona Activa","UPC","Barcelona Activa","Barcelona Activa_IT Academy"],"company":"IT Academy-Barcelona Activa","short":"IT Academy Certification Program"},{"day":3,"time":"15:45-16:00","stage":"XPRO stage","title":"Level up your apps: From Agent Protocols to Real-World API Innovation","speakers":[{"name":"Lauri Alho","role":"Head of Ecosystem Development at Nokia"}],"description":"Join this developer-focused session to explore how Network APIs are evolving toward autonomous, AI-driven connectivity. Discover how Agent Protocols and network-aware AI dynamically optimise performance, enable real-time decision-making, and unlock on-demand monetisation. Through live demos and real-world use cases, gain practical implementation insights you can apply immediately to build scalable, high-performing SuperApps.","tags":["Future Trends"],"lang":"English","companies":["Nokia"],"company":"Nokia","short":"Agent Protocols and API Innovation"},{"day":3,"time":"15:45-16:15","stage":"Gaming","title":"Chaos, Spectacle & Systems: Crafting the Sound of GodsTV","speakers":[{"name":"Enrique Lis Mesquida","role":"Sound designer at Melbot Studios"}],"description":"After introducing GODSTV, we will go through the design of its dynamic music system within a roguelite structure, exploring how adaptive techno-driven scoring responds to systemic gameplay. We’ll also dive into the creative freedom the game’s bizarre universe enables for sound design, and how audio and music help frame the experience as a live TV spectacle rather than a traditional game session. Luis Quevedo, jourinalist and presenter (Moderator)","tags":["GAMING"],"lang":"English","companies":["Melbot Studios"],"company":"Melbot Studios","short":"Audio Design for Entertainment"},{"day":3,"time":"16:00-16:45","stage":"XPRO stage","title":"Open Gateway Hackathon: Live Finals","speakers":[{"name":"Lauri Alho","role":"Head of Ecosystem Development at Nokia"}],"description":"Experience the excitement of the Open Gateway Hackathon Live Finals, where the top teams showcase groundbreaking solutions built using advanced telecom network APIs powered by Nokia’s Network as Code platform. Watch live demos, hear rapid-fire pitches, and see innovation tested on real networks. It’s interactive and decided by you—cast your vote and help crown the next wave of telecom-powered innovation.","tags":["Future Trends"],"lang":"English","companies":["Nokia"],"company":"Nokia","short":"Open Gateway Hackathon Finals"},{"day":3,"time":"16:00-17:00","stage":"Visionary Stage","title":"87-minutes game. How AI is boosting the Barça’s edge","speakers":[{"name":"Albert Mundet","role":"General Manager of Barça Innovation Hub"}],"description":"In an increasingly competitive sports industry, technology is no longer an accessory — it’s what amplifies what makes you unique. FC Barcelona showcase how AI is sharpening its competitive edge across performance, medical science, fan engagement, and commercial innovation. Leading clubs and institutions from around the world confirmed the same thesis: technology doesn’t replace identity, it amplifies it. For a 126-year-old club with 144,000 member-owners, AI means building smarter from within and buying better from outside. That’s Tech Your Edge.","tags":["Artificial Intelligence"],"lang":"English","companies":["FC Barcelona"],"company":"FC Barcelona","short":"AI Boosting Barça"},{"day":3,"time":"16:00-17:00","stage":"Meetup area","title":"In-house algorithm development: experience and lessons learned","speakers":[{"name":"Guillermo Prieto","role":"Director of Information Technologies at Damm"},{"name":"Daniel Roncel","role":"Data Scientist at Nennisiwok"}],"description":"","tags":["Software Development"],"lang":"English","companies":["Damm","Nennisiwok"],"company":"Damm","short":"Algorithm Development Best Practices"},{"day":3,"time":"16:15-17:15","stage":"Skills Hub","title":"CTO Leadership Lab: Communicate, Attract, and Retain Tech Talent","speakers":[{"name":"Sandra Alonso","role":"Program Leader at Eurofirms"},{"name":"Marisa Martínez","role":"Diversity & Inclusion Consultant at Eurofirms"},{"name":"Mireia López","role":"Diversity & Inclusion Consultant at Eurofirms"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Eurofirms"],"company":"Eurofirms","short":"CTO Leadership Development"},{"day":3,"time":"16:30-17:00","stage":"Robotics","title":"How to train your robot","speakers":[{"name":"Jesus Angel Bravo Duque","role":"Founder & CEO en Bravo Robots"}],"description":"The Generative AI revolution has also reached robotics. World and VLC (Vision, Language, Action) models applied to new robotic systems equipped with powerful computing systems allow non-deterministic tasks to be solved. It is time to train robots. This workshop will discuss the latest developments in embedded AI and how the robotics industry is responding.","tags":["ROBOTICS"],"lang":"Spanish","companies":["Bravo Robots"],"company":"Bravo Robots","short":"Robot Training Techniques"},{"day":3,"time":"16:30-17:30","stage":"Hotspot Talks","title":"Leading in a World That Doesn’t Wait","speakers":[{"name":"José Carlos Ruíz","role":"Specialist in Critical Thinking and Humanistic Leadership en PhD Professor of Philosophy at the University of Córdoba"}],"description":"Over 45 minutes, Pablo González Ruiz de la Torre and José Carlos Ruiz will engage in a calm and reflective conversation on humanistic leadership, addressing the intellectual, existential, and social dimensions of teams, and emphasizing the need to nurture identity and legacy as anchors in times of uncertainty.","tags":["Management"],"lang":"Spanish","companies":["PhD Professor of Philosophy at the University of Córdoba"],"company":"PhD Professor of Philosophy at the University of Córdoba","short":"Leading in Fast World"},{"day":3,"time":"16:30-17:30","stage":"XPRO Talks","title":"How Public Institutions Shape Real Opportunities","speakers":[{"name":"Alex Lobaco Poyatos","role":"Consorci per a la Formació Contínua de Catalunya – Subdirector de Programes en Consorci per a la Formació Contínua de Catalunya"},{"name":"Miquel Carrion Molina","role":"Servei Públic d’ocupació de Catalunya – Subdirector d’Ocupació Juvenil i Qualificació Professional en Servei Públic d’ocupació de Catalunya"},{"name":"Gaizka Cañellas Ayerdi","role":"Ironhack – Head of Business Development – B2G Director (Moderador)"},{"name":"Fernando Garrido Ferradanes","role":"EOI – Director de B2G"}],"description":"","tags":["Management"],"lang":"English","companies":["Consorci per a la Formació Contínua de Catalunya","SOC Catalunya","Ironhack","EOI"],"company":"Ironhack","short":"Public Institutions Creating Opportunities"},{"day":3,"time":"16:30-17:30","stage":"Barcelona","title":"Adversarial Development: Treat Your AI Assistant as Untrusted","speakers":[{"name":"Fernando Rodriguez","role":"Co-Founder & Chief Learning Officer (CLO) at Keep Coding"}],"description":"AI coding assistants write code at unprecedented speed—but speed without verification becomes technical debt. This talk introduces Adversarial Development, a quality framework inspired by GANs, SRE, and defense-in-depth. Treat AI as an adversarial generator and yourself as the discriminator using layered verification: prompt constraints, linting, runtime and visual checks. A practical playbook to ship faster without regressions or broken features","tags":["Artificial Intelligence"],"lang":"English","companies
