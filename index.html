<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MWC Talent Arena 2026 – Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="day-toggle">
      <button data-day="3" onclick="setDay(this)">Mar 3</button>
      <button data-day="4" onclick="setDay(this)">Mar 4</button>
    </div>
    <div class="view-btns">
      <button data-view="list" onclick="setView('list')">List</button>
      <button data-view="calendar" onclick="setView('calendar')">Cal</button>
      <button data-view="timeline" onclick="setView('timeline')">TL</button>
    </div>
    <div class="dropdown" id="stageDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('stageDropdown')"><span class="label">Stages</span> <span id="stageLabel">All</span></button>
      <div class="dropdown-menu" id="stageMenu"></div>
    </div>
    <div class="dropdown" id="tagDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('tagDropdown')"><span class="label">Topics</span> <span id="tagLabel">All</span></button>
      <div class="dropdown-menu" id="tagMenu"></div>
    </div>
    <div class="dropdown" id="langDropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('langDropdown')"><span class="label">Lang</span> <span id="langLabel">All</span></button>
      <div class="dropdown-menu" id="langMenu"></div>
    </div>
    <button class="show-highlighted-toggle" id="showHighlightedBtn" onclick="toggleShowHighlightedOnly()">Starred</button>
    <button class="show-hidden-toggle" id="showHiddenBtn" onclick="toggleShowHidden()">Hidden</button>
    <button class="show-hidden-toggle" id="restoreAllBtn" onclick="restoreAll()" style="display:none">Restore all</button>
    <input type="text" class="search-box" id="searchBox" placeholder="Search..." oninput="applyFilters()" onkeydown="if(!this._typed){this.select();this._typed=true}" onfocus="this._typed=false">
    <a href="help.html" class="help-link" title="Help">?</a>
  </div>
</div>
<div class="filter-panel" id="filterPanel" style="display:none"></div>

<!-- ── Content ── -->
<div class="content" id="content"></div>

<footer class="site-footer"><a href="help.html">Help</a> &middot; <a href="about.html">About</a></footer>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close modal-hide-btn" id="modalHighlightBtn" onclick="" title="Star" style="right:4.85rem">&#9733;</button>
    <button class="modal-close modal-hide-btn" id="modalHideBtn" onclick="">&minus;</button>
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
