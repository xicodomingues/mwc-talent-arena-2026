ients"},{"day":4,"time":"16:30-17:00","stage":"Robotics","title":"How to train your robot","speakers":[{"name":"Jesus Angel Bravo Duque","role":"Founder & CEO at Bravo Robots"}],"description":"The Generative AI revolution has also reached robotics. World and VLC (Vision, Language, Action) models applied to new robotic systems equipped with powerful computing systems allow non-deterministic tasks to be solved. It is time to train robots. This workshop will discuss the latest developments in embedded AI and how the robotics industry is responding.","tags":["ROBOTICS"],"lang":"Spanish","companies":["Bravo Robots"],"company":"Bravo Robots","short":"Robot Training Techniques"},{"day":4,"time":"16:30-17:30","stage":"Hotspot Talks","title":"From digital to agentic (a realistic approximation)","speakers":[{"name":"Lluc Guarro","role":"Digital & AI Business Director at Roca Salvatella"}],"description":"This isn’t a talk about tech promises; it’s about real-world execution. For leaders ready to move beyond basic digitization, we will break down the 10 strategic steps essential for efficient AI deployment. We will explore what the shift toward “agentic” workflows actually looks like through practical examples that bridge the gap between ambition and measurable impact. You will discover how to align business goals with human talent, avoiding the common traps that stall adoption. If you want a clear mental framework to make better decisions, prioritize investment, and lead your team with realism, this session provides the roadmap you can apply the next day.","tags":["Artificial Intelligence"],"lang":"English","companies":["Roca Salvatella"],"company":"Roca Salvatella","short":"Digital to Agentic Transition"},{"day":4,"time":"16:30-17:30","stage":"Plug-in Talks","title":"Exponential Leadership: Managing High-Performance IT Teams in the GenAI Era.","speakers":[{"name":"Carlos Vizoso Raya","role":"Chief Technology Officer & Digital Innovation Director at ESIC University"}],"description":"AI is redefining IT leadership. Discover how to adapt roles, foster Human-AI collaboration, and lead cultural transformation. We will explore strategies to optimize productivity, turn AI into a competitive advantage, and ensure your IT team stays at the forefront of innovation. Prepare your team for the future!","tags":["Management"],"lang":"Spanish","companies":["ESIC University"],"company":"ESIC University","short":"Exponential Leadership Growth"},{"day":4,"time":"16:30-17:30","stage":"XPRO Talks","title":"Our AI Agents Are Finally In Production — And Now What?","speakers":[{"name":"Jorge Hidalgo","role":"Associate Director - Software & Platform Engineering at Codemotion"}],"description":"Agentic AIs are driving organizations to reinvent the way they work but scaling from a few agents to thousands is not a simple endeavor. From the strong foundations of platform engineering principles to model gateways. From AI agent pipelines to continuous evaluation of agents. From agent to agent interactions to tool integrations. The “Swiss army knife” of AI-intensive platforms to cover what “I wish I had known six months ago.","tags":["Artificial Intelligence"],"lang":"English","companies":["Codemotion"],"company":"Codemotion","short":"AI Agents in Production"},{"day":4,"time":"16:30-17:30","stage":"Barcelona","title":"Talent, Innovation, and Opportunities in Emerging Tech Ecosystems","speakers":[{"name":"Carlos Jaime Llorens","role":"XarxaTec – General Manager (Moderator)"},{"name":"José Bort Mondragón","role":"XarxaTec – President"},{"name":"Ana Belén Arzo Cabrera","role":"Diputación de Castellón – Head of Economic Promotion and International Relations Service"},{"name":"Vicente Pallarés Renau","role":"Diputación de Castellón – Deputy"},{"name":"Nerea Safont Horma","role":"Technical Support Technician"}],"description":"Explore how technological and industrial ecosystems drive innovation, attract talent, and create new professional opportunities. The talk covers both established and emerging sectors such as Aerospace, Cybersecurity, and Cryptocurrencies, highlighting how they generate thousands of direct jobs and foster innovative projects, distributed leadership, and future trends in professional development.","tags":["Management"],"lang":"Spanish","companies":["XarxaTec","Diputación de Castellón"],"company":"XarxaTec","short":"Tech Ecosystems and Innovation"},{"day":4,"time":"16:45-18:15","stage":"Frontier lab","title":"Integrating Accessibility in Video Games by Por Talento Digital","speakers":[{"name":"Cristian Suárez Henríquez","role":"Accessibility Technician, Accessible Technologies Department"},{"name":"Gemma Guiu","role":"Deia School. Student, Degree in Video Game Design and Development"},{"name":"Oriol Vicente","role":"Deia School. Student, Degree in Video Game Design and Development"}],"description":"Raise awareness of the basic accessibility measures in video games through the Ga11y Accessible Video Games project, in collaboration withXtalento DigitalandDeia.","tags":["GAMING"],"lang":"Spanish","companies":["Por Talento Digital","Deia School"],"company":"Por Talento Digital","short":"Accessible Game Design"},{"day":4,"time":"16:45-18:15","stage":"XPRO Lab","title":"When Floats Lie: Quantization, Performance, and Why Rust Keeps AI from Corroding","speakers":[{"name":"Lawrence Freeman","role":"Founder/Instructor at Fledgio"},{"name":"Ernest Kissiedu","role":"Global Rust Community Coordinator at Rust"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["Fledgio","Rust"],"company":"Fledgio","short":"Rust Quantization Performance"},{"day":4,"time":"17:00-17:30","stage":"XPRO stage","title":"How Playgami Powers the Next Generation of Games","speakers":[{"name":"Hugo Pibernat","role":"CTO, Playgami at Scopely"}],"description":"Playgami, Scopely’s technology platform for game operations, has powered some of the world’s most successful mobile games for over a decade. Despite its 12-year history, it still feels modern, adaptable, and ahead of the industry curve. The session explores the software development principles and architectural choices behind its long-term evolution, resilience, and speed, and how close collaboration with internal studios and product teams shaped its roadmap and driven adoption across Scopely.","tags":["Software Development"],"lang":"English","companies":["Scopely"],"company":"Scopely","short":"Playgami Gaming Platform"},{"day":4,"time":"17:00-17:30","stage":"Visionary Stage","title":"Leadership When Machines Also Decide","speakers":[{"name":"Oiane Etxebarria Tobias","role":"Lecturer on the Master's Degree in Marketing, Digital and E-commerce Barcelona at EAE Business School"}],"description":"Artificial intelligence not only accelerates processes—it is redefining how decisions are made in organizations. Systems that analyze, recommend, and execute now share the space of human judgment. In this context, leadership means designing robust decision-making frameworks, governing judgment, and taking responsibility in hybrid environments. We will explore which competencies will make the difference and why value will lie in strategic judgment.","tags":["Management"],"lang":"Spanish","companies":["EAE Business School"],"company":"EAE Business School","short":"Leadership in AI Decision-Making"},{"day":4,"time":"17:00-18:00","stage":"Meetup area","title":"Sharing to Grow: How Mentorship Multiplies Talent and Diversity","speakers":[{"name":"Elena Guidi","role":"Senior Software Engineer, Thoughtworks at Commit Conf"}],"description":"","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["Commit Conf"],"company":"Commit Conf","short":"Mentorship and Diversity Growth"},{"day":4,"time":"17:30-18:00","stage":"XPRO stage","title":"From Disruption to Adoption, The Secure GPT Journey","speakers":[{"name":"Francisco Herrero","role":"Software Engineer Lead at AXA"}],"description":"Discover AXA’s transformative journey with Secure GPT: a robust GenAI platform for enterprise safety, scalability, and innovation. Secure GPT offers a user-friendly web interface and a secure API gateway, enabling seamless GenAI use in daily work. Learn how iterative adoption, federated collaboration, and continuous upskilling are driving Secure GPT’s evolution—empowering AXA employees worldwide to innovate securely and efficiently.","tags":["Artificial Intelligence"],"lang":"English","companies":["AXA"],"company":"AXA","short":"Secure GPT Implementation"},{"day":4,"time":"17:30-18:00","stage":"Visionary Stage","title":"Magamers Award Ceremony","speakers":[{"name":"MAGAMERS 2026","role":""}],"description":"Closing ceremony of the Magamers by Santander 2026 women’s tournament, where the best moments of the competition will be revisited and female talent in esports will be highlighted. The event will be hosted by Pablo Grandío (Vandal and Quincemil) and will feature contributions from Cruz Sánchez de Lara, Óscar “Fosky” Compadre, and José Sánchez Montero (FNAC), who will reflect on the role of women in the video game industry. The ceremony will conclude with the presentation of trophies and prize checks to the champion and runner-up teams, followed by the official closing of the tournament.","tags":["GAMING"],"lang":"English","companies":[],"company":"Magamers","short":"Magamers Awards Celebration"},{"day":4,"time":"17:30-18:30","stage":"Hotspot Talks","title":"10 lessons I would have said to the me of 25 years ago","speakers":[{"name":"Jordi Urbea","role":"CEO at Ogilvy Spain"}],"description":"We live in a time of unprecedented transformation. Artificial Intelligence is redefining the rules of the game, and in this environment, adaptability and strategic vision are more crucial than ever. Throughout my career, I have learned that success is not only measured in results, but in the ability to inspire, innovate and lead in uncertainty. I want to share with you 10 principles that I consider fundamental to thriving in this dynamic environment. These reflections, based on my personal experience, will provide you with practical guidance for meeting challenges, embracing innovation and achieving sustainable success. Together, we will explore how to transform disruption into opportunity and build a more prosperous future for all.","tags":["Management"],"lang":"English","companies":["Ogilvy Spain"],"company":"Ogilvy Spain","short":"Career Lessons Over 25 Years"},{"day":4,"time":"17:30-18:30","stage":"Plug-in Talks","title":"Closing of the ALIA Challenge: Humans in the Loop Hackathon Awards","speakers":[{"name":"Montserrat Guardia Güell (moderator)","role":"Chief People & Culture Officer / President of the Board of Trustee’s of UPC"},{"name":"María Jesús Martín","role":"Head of the Division for Governance and Planning of Artificial Intelligence / State Secretariat for Digitization and Artificial Intelligence"},{"name":"Paul Van Branteghem","role":"AI Advisor at SEDIA"},{"name":"Cristian Canton","role":"Director asociado at BSC-CNS"}],"description":"","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["UPC","SEDIA","BSC-CNS"],"company":"BSC-CNS","short":"ALIA Challenge Awards Closing"},{"day":4,"time":"17:30-18:30","stage":"XPRO Talks","title":"We are Superhuman","speakers":[{"name":"Laia Ferrao (Moderator)","role":"Senior Manager, M&A Change and Communications atdsm-firmenich"},{"name":"Jordi Montserrat","role":"Director, GSC CX Process & Solutions at dsm-firmenich"},{"name":"Marc Barbeta","role":"Manager, Collaboration Chapter Lead at dsm-firmenich"},{"name":"David Grau","role":"Manager, D&T Workplace & Collaboration Engineering at dsm-firmenich"}],"description":"dsm‑firmenich’s We Are Superhuman campaign empowers every employee to amplify their potential with AI. By embedding accessible tools, learning, and a culture of experimentation, we boost productivity, spark innovation, and enable teams to work smarter and create with superhuman impact.","tags":["Artificial Intelligence"],"la const STAGE_COLORS = {"XPRO stage": "#FFD700", "XPRO Lab": "#FF6B35", "XPRO Talks": "#00BCD4", "Visionary Stage": "#9B59B6", "Hotspot Talks": "#3498DB", "Plug-in Talks": "#E74C3C", "Focus Lab": "#2ECC71", "Frontier lab": "#FF4081", "Meetup area": "#78909C", "Barcelona": "#FFEB3B", "Skills Hub": "#26A69A", "Robotics": "#7C4DFF", "Gaming": "#F50057", "TECHNICAL DEV DIVES": "#546E7A"};
const STAGE_ORDER = ["XPRO stage", "XPRO Lab", "XPRO Talks", "Visionary Stage", "Hotspot Talks", "Plug-in Talks", "Focus Lab", "Frontier lab", "Meetup area", "Barcelona", "Skills Hub", "Robotics", "Gaming"];
const ALL_TAGS = ["Artificial Intelligence", "Cloud Computing", "Cybersecurity", "Future Trends", "GAMING", "Management", "ROBOTICS", "Software Development"];
const LANG_FLAGS = {English:"\u{1F1EC}\u{1F1E7}",Spanish:"\u{1F1EA}\u{1F1F8}",Catalan:"\u{1F3F4}"};
const LANG_CLASS = {English:"lang-en",Spanish:"lang-es",Catalan:"lang-ca"};

// ── State ──
// Parse hash: #day=3&view=calendar
function parseHash() {
  const params = new URLSearchParams(location.hash.slice(1));
  return { day: params.get("day"), view: params.get("view") };
}
function updateHash() {
  const params = new URLSearchParams();
  params.set("day", dayFilter);
  params.set("view", currentView);
  history.replaceState(null, "", "#" + params.toString());
}
const _hash = parseHash();
let currentView = _hash.view || (window.innerWidth >= 768 ? "calendar" : "list");
let dayFilter = _hash.day || (new Date().getDate() === 4 ? "4" : "3");
let searchQuery = "";
const ALL_LANGS = ["English", "Spanish", "Catalan"];
let activeLangs = new Set(ALL_LANGS);
let activeStages = new Set(STAGE_ORDER);
let activeTags = new Set(ALL_TAGS);
let filteredIndices = [];

// Hidden sessions (persisted in localStorage)
const LS_KEY = "mwc_hidden_sessions";
let hiddenSessions = new Set(JSON.parse(localStorage.getItem(LS_KEY) || "[]"));
let showHidden = localStorage.getItem("showHidden") === "true";

// Calendar stage visibility (persisted)
const LS_CAL_STAGES_KEY = "mwc_cal_hidden_stages";
let calHiddenStages = new Set(JSON.parse(localStorage.getItem(LS_CAL_STAGES_KEY) || "[]"));

function toggleCalStage(stage) {
  if (calHiddenStages.has(stage)) calHiddenStages.delete(stage); else calHiddenStages.add(stage);
  localStorage.setItem(LS_CAL_STAGES_KEY, JSON.stringify([...calHiddenStages]));
  render();
}


function saveHidden() {
  localStorage.setItem(LS_KEY, JSON.stringify([...hiddenSessions]));
  updateHiddenCount();
}
function toggleHide(idx, evt) {
  if (evt) evt.stopPropagation();
  if (hiddenSessions.has(idx)) hiddenSessions.delete(idx); else hiddenSessions.add(idx);
  saveHidden();
  applyFilters();
}
function toggleShowHidden() {
  showHidden = !showHidden;
  localStorage.setItem("showHidden", showHidden);
  document.getElementById("showHiddenBtn").classList.toggle("active", showHidden);
  updateHiddenCount();
  applyFilters();
}
function restoreAll() {
  hiddenSessions.clear();
  localStorage.setItem(LS_KEY, "[]");
  showHidden = false;
  localStorage.setItem("showHidden", "false");
  document.getElementById("showHiddenBtn").classList.remove("active");
  updateHiddenCount();
  applyFilters();
}
function updateHiddenCount() {
  const btn = document.getElementById("showHiddenBtn");
  const n = hiddenSessions.size;
  btn.textContent = n ? "Show hidden (" + n + ")" : "Show hidden";
  document.getElementById("restoreAllBtn").style.display = (n && showHidden) ? "" : "none";
}

// ── Build search index ──
const searchIndex = SESSIONS.map(s => {
  const parts = [s.title, s.stage, s.description, s.lang, ...s.tags];
  for (const sp of s.speakers) {
    parts.push(sp.name);
    if (sp.role) {
      parts.push(sp.role);
      const m = sp.role.match(/(?:at|en)\s+(.+)$/i);
      if (m) parts.push(m[1]);
    }
  }
  return parts.join(" ").toLowerCase();
});

// ── Init ──
function init() {
  // Sync day button active state
  document.querySelectorAll(".day-toggle button").forEach(b => b.classList.toggle("active", b.dataset.day === dayFilter));
  buildStageMenu();
  buildTagMenu();
  buildLangMenu();
  document.getElementById("showHiddenBtn").classList.toggle("active", showHidden);
  updateHiddenCount();
  setView(currentView);
}

function buildStageMenu() {
  const el = document.getElementById("stageMenu");
  let html = "";
  for (const st of STAGE_ORDER) {
    const c = STAGE_COLORS[st] || "#888";
    const checked = activeStages.has(st) ? "checked" : "";
    html += `<label class="dropdown-item"><input type="checkbox" ${checked} onchange="toggleStage('${esc(st)}')"><span style="color:${c}">${esc(st)}</span></label>`;
  }
  el.innerHTML = html;
  updateStageLabel();
}

function buildTagMenu() {
  const el = document.getElementById("tagMenu");
  let html = "";
  for (const tag of ALL_TAGS) {
    const checked = activeTags.has(tag) ? "checked" : "";
    html += `<label class="dropdown-item"><input type="checkbox" ${checked} onchange="toggleTag('${esc(tag)}')">${esc(tag)}</label>`;
  }
  el.innerHTML = html;
  updateTagLabel();
}

// ── Filters ──
function setDay(btn) {
  dayFilter = btn.dataset.day;
  document.querySelectorAll(".day-toggle button").forEach(b => b.classList.toggle("active", b === btn));
  updateHash();
  applyFilters();
}

function toggleStage(st) {
  if (activeStages.has(st)) activeStages.delete(st); else activeStages.add(st);
  updateStageLabel();
  applyFilters();
}

function updateStageLabel() {
  const el = document.getElementById("stageLabel");
  if (activeStages.size === STAGE_ORDER.length) el.textContent = "All";
  else if (activeStages.size === 0) el.textContent = "None";
  else el.textContent = activeStages.size + "/" + STAGE_ORDER.length;
}

function toggleTag(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag); else activeTags.add(tag);
  updateTagLabel();
  applyFilters();
}

function updateTagLabel() {
  const el = document.getElementById("tagLabel");
  if (activeTags.size === ALL_TAGS.length) el.textContent = "All";
  else if (activeTags.size === 0) el.textContent = "None";
  else el.textContent = activeTags.size + "/" + ALL_TAGS.length;
}

function buildLangMenu() {
  const el = document.getElementById("langMenu");
  const flags = {English:"\u{1F1EC}\u{1F1E7}",Spanish:"\u{1F1EA}\u{1F1F8}",Catalan:"\u{1F3F4}"};
  let html = "";
  for (const lang of ALL_LANGS) {
    const checked = activeLangs.has(lang) ? "checked" : "";
    html += `<label class="dropdown-item"><input type="checkbox" ${checked} onchange="toggleLang('${lang}')">${flags[lang]||""} ${lang}</label>`;
  }
  el.innerHTML = html;
  updateLangLabel();
}

function toggleLang(lang) {
  if (activeLangs.has(lang)) activeLangs.delete(lang); else activeLangs.add(lang);
  updateLangLabel();
  applyFilters();
}

function updateLangLabel() {
  const el = document.getElementById("langLabel");
  if (activeLangs.size === ALL_LANGS.length) el.textContent = "All";
  else if (activeLangs.size === 0) el.textContent = "None";
  else el.textContent = [...activeLangs].map(l => l.slice(0,2).toUpperCase()).join(", ");
}

function toggleDropdown(id) {
  const dd = document.getElementById(id);
  dd.classList.toggle("open");
}

// Close dropdown when clicking outside
document.addEventListener("click", e => {
  if (!e.target.closest(".dropdown")) {
    document.querySelectorAll(".dropdown.open").forEach(d => d.classList.remove("open"));
  }
});

function toggleFilters() {
  document.getElementById("filterPanel").classList.toggle("open");
  document.getElementById("filterToggle").classList.toggle("active");
}

function applyFilters() {
  searchQuery = document.getElementById("searchBox").value.toLowerCase().trim();

  filteredIndices = [];
  for (let i = 0; i < SESSIONS.length; i++) {
    const s = SESSIONS[i];
    if (!showHidden && hiddenSessions.has(i)) continue;
    if (dayFilter && String(s.day) !== dayFilter) continue;
    if (activeLangs.size < ALL_LANGS.length && s.lang && !activeLangs.has(s.lang)) continue;
    if (activeStages.size < STAGE_ORDER.length && !activeStages.has(s.stage)) continue;
    if (activeTags.size < ALL_TAGS.length) {
      const sTags = s.tags || [];
      if (sTags.length > 0 && !sTags.some(t => activeTags.has(t))) continue;
    }
    if (searchQuery && !searchIndex[i].includes(searchQuery)) continue;
    filteredIndices.push(i);
  }

  const hidCount = hiddenSessions.size;
  const visibleCount = filteredIndices.filter(i => !hiddenSessions.has(i)).length;
  let statsText = visibleCount + " of " + SESSIONS.length + " sessions";
  if (showHidden && hidCount) statsText += " (" + hidCount + " hidden shown)";
  document.getElementById("stats").textContent = statsText;
  render();
}

// ── Render dispatch ──
function setView(v) {
  currentView = v;
  document.querySelectorAll(".view-btns button").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  updateHash();
  applyFilters();
}

function render() {
  if (currentView === "list") renderList();
  else if (currentView === "calendar") renderCalendar();
  else renderTimeline();
}

// ── List View ──
function renderList() {
  const el = document.getElementById("content");
  if (!filteredIndices.length) { el.innerHTML = '<p style="text-align:center;color:var(--text3);padding:3rem">No sessions match your filters.</p>'; return; }

  // Group by day → time
  const grouped = {};
  for (const idx of filteredIndices) {
    const s = SESSIONS[idx];
    const key = s.day + "|" + s.time;
    if (!grouped[key]) grouped[key] = {day: s.day, time: s.time, items: []};
    grouped[key].items.push(idx);
  }

  const keys = Object.keys(grouped).sort();
  let html = "";
  let lastDay = null;
  for (const k of keys) {
    const g = grouped[k];
    if (g.day !== lastDay) {
      lastDay = g.day;
      html += `<h2 class="day-heading">March ${g.day}</h2>`;
    }
    html += `<div class="time-slot-heading">${esc(g.time)}</div>`;
    html += '<div class="list-cards">';
    for (const idx of g.items) html += cardHTML(idx);
    html += '</div>';
  }
  el.innerHTML = html;
}

function cardHTML(idx) {
  const s = SESSIONS[idx];
  const c = STAGE_COLORS[s.stage] || "#888";
  const spk = s.speakers.map(sp => sp.name).join(", ");
  const co = s.company || "";
  const isHidden = hiddenSessions.has(idx);
  let html = `<div class="card${isHidden ? " hidden-session" : ""}" style="--card-color:${c}" onclick="showModal(${idx})">`;
  html += `<button class="hide-btn" onclick="toggleHide(${idx},event)" title="${isHidden ? "Unhide" : "Hide"}">${isHidden ? "\u{2795}" : "\u{2796}"}</button>`;
  html += `<span class="card-stage">${esc(s.stage)}</span>`;
  html += `<div class="card-title">${esc(s.title)}</div>`;
  const spkLine = [co, spk].filter(Boolean).join(" – ");
  if (spkLine) html += `<div class="card-speakers">${esc(spkLine)}</div>`;
  if (s.description) html += `<div class="card-desc">${esc(s.description)}</div>`;
  if (s.tags.length || s.lang) {
    html += '<div class="card-meta">';
    for (const t of s.tags) html += `<span class="card-tag">${esc(t)}</span>`;
    if (s.lang) {
      const lc = LANG_CLASS[s.lang] || "";
      html += `<span class="card-lang ${lc}">${(LANG_FLAGS[s.lang]||"")} ${esc(s.lang)}</span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ── Calendar View ──
function renderCalendar() {
  const el = document.getElementById("content");
  if (!filteredIndices.length) { el.innerHTML = '<p style="text-align:center;color:var(--text3);padding:3rem">No sessions match your filters.</p>'; return; }

  const days = [...new Set(filteredIndices.map(i => SESSIONS[i].day))].sort();
  let html = "";
  for (const day of days) {
    const dayIndices = filteredIndices.filter(i => SESSIONS[i].day === day);
    html += calendarDayHTML(day, dayIndices);
  }
  el.innerHTML = html;
}

function parseTime(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function calendarDayHTML(day, indices) {
  // Collect stages present (exclude hidden)
  const stagesPresent = [];
  const stagesAll = []; // all stages with data, for the toggle row
  for (const st of STAGE_ORDER) {
    if (indices.some(i => SESSIONS[i].stage === st)) {
      stagesAll.push(st);
      if (!calHiddenStages.has(st)) stagesPresent.push(st);
    }
  }

  // Time range
  let minT = 1440, maxT = 0;
  for (const i of indices) {
    const [start, end] = SESSIONS[i].time.split("-");
    const s = parseTime(start), e = parseTime(end);
    if (s < minT) minT = s;
    if (e > maxT) maxT = e;
  }
  minT = Math.floor(minT / 30) * 30;
  maxT = Math.ceil(maxT / 30) * 30;

  const ppm = 3; // pixels per minute
  const headerH = 44;
  const timeCol = 50;
  const colW = 140;
  const totalW = timeCol + stagesPresent.length * colW;
  const totalH = headerH + (maxT - minT) * ppm;
  const stageIdx = {};
  stagesPresent.forEach((st, i) => stageIdx[st] = i);

  const bodyH = (maxT - minT) * ppm;

  let html = `<h2 class="day-heading">March ${day}</h2>`;
  html += `<div class="cal-wrapper"><div class="cal-grid" style="width:${totalW}px">`;

  // Sticky header row
  html += `<div class="cal-header">`;
  html += `<div class="cal-header-corner"></div>`;
  for (const st of stagesPresent) {
    const c = STAGE_COLORS[st] || "#888";
    html += `<div class="cal-stage-hdr" style="width:${colW}px;color:${c};border-bottom:2px solid ${c}" onclick="toggleCalStage('${esc(st)}')" title="Click to hide">${esc(st)}</div>`;
  }
  html += `</div>`;

  // Hidden stages restore bar (only visible when "Show hidden" is active)
  const hiddenHere = stagesAll.filter(st => calHiddenStages.has(st));
  if (hiddenHere.length && showHidden) {
    html += `<div class="cal-hidden-bar">`;
    html += `<span class="cal-hidden-label">Hidden:</span>`;
    for (const st of hiddenHere) {
      const c = STAGE_COLORS[st] || "#888";
      html += `<button class="pill" style="--pill-color:${c}" onclick="toggleCalStage('${esc(st)}')">${esc(st)}</button>`;
    }
    html += `</div>`;
  }

  // Body (events + grid) — top offset so first label isn't clipped
  const padTop = 14;
  html += `<div class="cal-body" style="height:${bodyH + padTop}px;position:relative">`;

  // Grid lines + time labels
  for (let t = minT; t <= maxT; t += 30) {
    const y = (t - minT) * ppm + padTop;
    const label = Math.floor(t/60) + ":" + String(t%60).padStart(2,"0");
    html += `<div class="cal-time-label" style="position:absolute;top:${y - 8}px;left:0">${label}</div>`;
    html += `<div class="cal-gridline" style="top:${y}px;left:${timeCol}px;width:${totalW - timeCol}px"></div>`;
  }

  // Stage separator lines
  for (let i = 0; i <= stagesPresent.length; i++) {
    const left = timeCol + i * colW;
    html += `<div class="cal-stageline" style="left:${left}px;top:${padTop}px;height:${bodyH}px"></div>`;
  }

  // Events
  const _now = new Date();
  const _nowDay = _now.getDate();
  const _nowM = _now.getHours() * 60 + _now.getMinutes();
  for (const idx of indices) {
    const s = SESSIONS[idx];
    if (!(s.stage in stageIdx)) continue;
    if (calHiddenStages.has(s.stage)) continue;
    const [startStr, endStr] = s.time.split("-");
    let startM = parseTime(startStr), endM = parseTime(endStr);
    if (endM <= startM) endM = startM + 30;
    const y = (startM - minT) * ppm + padTop;
    const h = Math.max((endM - startM) * ppm - 2, 4);
    const left = timeCol + stageIdx[s.stage] * colW + 2;
    const w = colW - 4;
    const c = STAGE_COLORS[s.stage] || "#888";
    const co = s.company || "";

    const isHidden = hiddenSessions.has(idx);
    const isPast = _nowDay == day && endM <= _nowM;
    const isOngoing = _nowDay == day && startM <= _nowM && endM > _nowM;
    html += `<div class="cal-ev${isHidden ? " hidden-session" : ""}${isPast ? " cal-past" : ""}${isOngoing ? " cal-ongoing" : ""}" onclick="showModal(${idx})" style="top:${y}px;left:${left}px;width:${w}px;height:${h}px;background:color-mix(in srgb,${c} 15%,transparent);border-left:3px solid ${c}" title="${esc(s.time + ' | ' + s.stage + '\n' + s.title)}">`;
    html += `<b>${esc(s.title)}</b>`;
    if (co) html += `<div class="ev-spk">${esc(co)}</div>`;
    html += `</div>`;
  }

  // Now line (shifted 15min up so you see upcoming sessions)
  const now = new Date();
  const nowDay = now.getDate();
  if (nowDay == day) {
    const nowM = now.getHours() * 60 + now.getMinutes();
    if (nowM >= minT && nowM <= maxT) {
      const nowY = (nowM - minT) * ppm + padTop;
      html += `<div class="cal-now-line" data-now-offset="${nowY}" style="top:${nowY}px;left:${timeCol}px;width:${totalW - timeCol}px"></div>`;
    }
  }

  html += `</div>`; // cal-body
  html += `</div></div>`; // cal-grid, cal-wrapper
  return html;
}

// ── Timeline View (horizontal Gantt) ──
function renderTimeline() {
  const el = document.getElementById("content");
  if (!filteredIndices.length) { el.innerHTML = '<p style="text-align:center;color:var(--text3);padding:3rem">No sessions match your filters.</p>'; return; }

  const ppm = 5; // pixels per minute (horizontal)
  const rowH = 22; // row height per stage
  const labelW = 0;
  const now = new Date();
  const nowM = now.getHours() * 60 + now.getMinutes();
  const nowDay = now.getDate();

  const days = [...new Set(filteredIndices.map(i => SESSIONS[i].day))].sort();
  let html = "";
  for (const day of days) {
    html += `<h2 class="day-heading">March ${day}</h2>`;
    const dayIndices = filteredIndices.filter(i => SESSIONS[i].day === day);

    // Find stages present and time range
    const stagesPresent = [];
    for (const st of STAGE_ORDER) {
      if (dayIndices.some(i => SESSIONS[i].stage === st)) stagesPresent.push(st);
    }
    let minT = 1440, maxT = 0;
    for (const i of dayIndices) {
      const [start, end] = SESSIONS[i].time.split("-");
      const s = parseTime(start), e = parseTime(end);
      if (s < minT) minT = s;
      if (e > maxT) maxT = e;
    }
    minT = Math.floor(minT / 30) * 30;
    maxT = Math.ceil(maxT / 30) * 30;

    const bodyW = (maxT - minT) * ppm;
    const totalW = labelW + bodyW;
    const bodyH = stagesPresent.length * rowH;
    const stageIdx = {};
    stagesPresent.forEach((st, i) => stageIdx[st] = i);

    html += `<div class="tl-wrapper"><div class="tl-grid" style="width:${totalW}px">`;

    // Time header
    html += `<div class="tl-header">`;
    for (let t = minT; t < maxT; t += 30) {
      const x = (t - minT) * ppm;
      const w = 30 * ppm;
      const label = Math.floor(t / 60) + ":" + String(t % 60).padStart(2, "0");
      html += `<div class="tl-time-hdr" style="width:${w}px">${label}</div>`;
    }
    html += `</div>`;

    // Body
    html += `<div class="tl-body" style="height:${bodyH}px;position:relative">`;

    // Vertical gridlines
    for (let t = minT; t <= maxT; t += 30) {
      const x = labelW + (t - minT) * ppm;
      html += `<div class="tl-gridline" style="left:${x}px;top:0;height:${bodyH}px"></div>`;
    }

    // Stage row lines
    for (let i = 1; i < stagesPresent.length; i++) {
      const y = i * rowH;
      html += `<div style="position:absolute;left:${labelW}px;top:${y}px;width:${bodyW}px;height:1px;background:#1a1a1a"></div>`;
    }

    // Events
    for (const idx of dayIndices) {
      const s = SESSIONS[idx];
      if (!(s.stage in stageIdx)) continue;
      const c = STAGE_COLORS[s.stage] || "#888";
      const [startStr, endStr] = s.time.split("-");
      let startM = parseTime(startStr), endM = parseTime(endStr);
      if (endM <= startM) endM = startM + 30;
      const x = labelW + (startM - minT) * ppm;
      const w = Math.max((endM - startM) * ppm - 4, 20);
      const y = stageIdx[s.stage] * rowH + 2;
      const h = rowH - 4;
      const isHidden = hiddenSessions.has(idx);
      const isPast = nowDay == day && endM <= nowM;
      const isOngoing = nowDay == day && startM <= nowM && endM > nowM;
      html += `<div class="tl-ev${isHidden ? " hidden-session" : ""}${isPast ? " tl-past" : ""}${isOngoing ? " tl-ongoing" : ""}" onclick="showModal(${idx})" style="top:${y}px;left:${x}px;width:${w}px;height:${h}px;background:color-mix(in srgb,${c} 25%,transparent)" title="${esc(s.time + ' | ' + s.title)}"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${c};margin-right:4px;flex-shrink:0"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${esc(s.short || s.title)}</span></div>`;
    }

    // Now line
    if (nowDay == day && nowM >= minT && nowM <= maxT) {
      const nowX = labelW + (nowM - minT) * ppm;
      html += `<div class="tl-now-line" style="left:${nowX}px;top:0;height:${bodyH}px"></div>`;
    }

    html += `</div>`; // tl-body
    html += `</div></div>`; // tl-grid, tl-wrapper

    // Legend
    html += `<div class="tl-legend">`;
    for (const stage of stagesPresent) {
      const c = STAGE_COLORS[stage] || "#888";
      html += `<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:4px;vertical-align:middle"></span>${esc(stage)}</span>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;

  // Scroll to now line
  const nowLine = document.querySelector(".tl-now-line");
  if (nowLine) {
    const wrapper = nowLine.closest(".tl-wrapper");
    if (wrapper) wrapper.scrollLeft = Math.max(0, nowLine.offsetLeft - 60);
  }
}

// ── Modal ──
function showModal(idx) {
  const s = SESSIONS[idx];
  const c = STAGE_COLORS[s.stage] || "#888";
  let html = "";
  html += `<div class="modal-stage" style="color:${c};background:color-mix(in srgb,${c} 15%,transparent)">${esc(s.stage)}</div>`;
  html += `<div class="modal-title">${esc(s.title)}</div>`;
  html += `<div class="modal-time">${esc(s.time)} \u2022 March ${s.day}</div>`;

  if (s.speakers.length) {
    html += '<div class="modal-speakers">';
    for (const sp of s.speakers) {
      html += `<div><span class="modal-speaker-name">${esc(sp.name)}</span>`;
      if (sp.role) html += ` <span class="modal-speaker-role">\u2013 ${esc(sp.role)}</span>`;
      html += `</div>`;
    }
    html += '</div>';
  }

  if (s.description) html += `<div class="modal-desc">${esc(s.description)}</div>`;

  html += '<div class="modal-meta">';

  // Update hide button in header
  const mHidden = hiddenSessions.has(idx);
  const hBtn = document.getElementById("modalHideBtn");
  hBtn.innerHTML = mHidden ? "+" : "&minus;";
  hBtn.onclick = function() {
    const wasHidden = hiddenSessions.has(idx);
    toggleHide(idx);
    closeModal();
    showToast(wasHidden ? "Session restored" : "Session hidden");
  };
  for (const t of s.tags) html += `<span>${esc(t)}</span>`;
  if (s.lang) {
    const flag = LANG_FLAGS[s.lang] || "";
    html += `<span>${flag} ${esc(s.lang)}</span>`;
  }
  html += '</div>';

  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalBackdrop").classList.add("open");
}

function closeModal() {
  document.getElementById("modalBackdrop").classList.remove("open");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// Close on backdrop click or Escape
document.getElementById("modalBackdrop").addEventListener("click", e => {
  if (e.target === document.getElementById("modalBackdrop")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Util ──
function esc(text) {
  const d = document.createElement("div");
  d.textContent = String(text);
  return d.innerHTML;
}

// ── Drag-to-scroll for calendar wrappers ──
function initDragScroll() {
  document.querySelectorAll(".cal-wrapper, .tl-wrapper").forEach(el => {
    let isDown = false, startX, startY, scrollL, scrollT, moved;
    el.addEventListener("mousedown", e => {
      if (e.button !== 0) return;
      isDown = true; moved = false;
      el.classList.add("dragging");
      startX = e.pageX; startY = e.pageY;
      scrollL = el.scrollLeft; scrollT = el.scrollTop;
    });
    el.addEventListener("mousemove", e => {
      if (!isDown) return;
      e.preventDefault();
      const dx = e.pageX - startX, dy = e.pageY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      el.scrollLeft = scrollL - dx;
      el.scrollTop = scrollT - dy;
    });
    const stop = () => { isDown = false; el.classList.remove("dragging"); };
    el.addEventListener("mouseup", stop);
    el.addEventListener("mouseleave", stop);
    // Prevent click on events when we just dragged
    el.addEventListener("click", e => { if (moved) { e.stopPropagation(); moved = false; } }, true);
  });
}

// Re-init drag after each render + scroll to now
const _origRenderCal = renderCalendar;
renderCalendar = function() {
  _origRenderCal();
  initDragScroll();
  const nowLine = document.querySelector(".cal-now-line");
  if (nowLine) {
    const wrapper = nowLine.closest(".cal-wrapper");
    if (wrapper) {
      const lineTop = nowLine.offsetTop;
      wrapper.scrollTop = Math.max(0, lineTop - 45);
    }
  }
};

// ── Scroll to current time (list/timeline) ──
function scrollToNowSlot() {
  const now = new Date();
  const nowM = now.getHours() * 60 + now.getMinutes();
  const slots = document.querySelectorAll(".time-slot-heading, .tl-slot-time");
  let best = null, bestDiff = Infinity;
  for (const el of slots) {
    const m = el.textContent.match(/(\d{2}):(\d{2})/);
    if (!m) continue;
    const t = parseInt(m[1]) * 60 + parseInt(m[2]);
    const diff = Math.abs(t - nowM);
    if (diff < bestDiff) { bestDiff = diff; best = el; }
  }
  if (best && bestDiff < 120) {
    best.scrollIntoView({behavior: "smooth", block: "start"});
  }
}

const _origRender = render;
render = function() {
  _origRender();
  if (currentView === "list") scrollToNowSlot();
  if (currentView === "timeline") initDragScroll();
};

// ── Start ──
init();

// Refresh every 5 minutes to update the now line
setInterval(() => { render(); }, 5 * 60 * 1000);
</script>
