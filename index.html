":["Keep Coding"],"company":"Keep Coding","short":"Adversarial Development Practices"},{"day":3,"time":"16:30-17:30","stage":"Plug-in Talks","title":"AI with Human Values: The Challenge of Ethical and Cultural Alignment","speakers":[{"name":"Paul Van Branteghem (moderador)","role":"AI Advisor at SEDIA"},{"name":"María Grandury","role":"ML research engineer at SomosNLP"},{"name":"Javier Aula-Blasco","role":"Head of Trustworthiness & Evaluation, AI Institute at BSC-CNS"},{"name":"Elena González-Blanco García","role":"Head of AI for Digital Natives at Microsoft"}],"description":"","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["SEDIA","SomosNLP","BSC-CNS","Microsoft"],"company":"SEDIA","short":"Ethical AI and Human Values"},{"day":3,"time":"16:45-17:00","stage":"XPRO stage","title":"Secure Your MCP Servers with OAuth, JWT, SPIFFE and More","speakers":[{"name":"Lin Sun","role":"Head of Open Source at Solo.io"}],"description":"You’ve built an MCP server, but how do you secure it without rewriting everything? In this demo-led session, discover a smarter way to add authentication and authorisation without modifying or redeploying your servers. See how an MCP gateway can apply OAuth, JWT, and other identity systems at scale, and watch an AI agent securely interact with MCP tools showing how to simplify security across multiple servers.","tags":["Future Trends"],"lang":"English","companies":["Solo.io"],"company":"Solo.io","short":"Securing MCP Servers"},{"day":3,"time":"16:45-18:15","stage":"Focus Lab","title":"Stop prompting, start building real solutions with AI","speakers":[{"name":"Yann Klein","role":"Software & Data Engineer at Le Wagon"}],"description":"Move beyond simple prompting to unlock AI’s true potential by designing automated systems. This workshop guides you from manual chatting to building robust solutions, covering: – AI workflows: automate repetitive tasks, turning hours of work into seconds – Agentic AI: watch AI agents go beyond simple responses to take real-world action – Vibe coding: create functional tools using plain English descriptions, regardless of your coding experience","tags":["Software Development"],"lang":"English","companies":["Le Wagon"],"company":"Le Wagon","short":"Building Real Solutions with AI"},{"day":3,"time":"16:45-18:15","stage":"Frontier lab","title":"Prototype to Product: Scaling Edge AI Across use cases","speakers":[{"name":"Morris Novello","role":"Head of Developer Marketing at Qualcomm"}],"description":"Learn how to scale Edge AI applications across Qualcomm® developer kits and evaluation kits (EVKs) in this hands‑on workshop. Using keyword spotting as a practical example, you’ll see how the same ML pipeline can move from prototyping to deployment across multiple system‑on‑chips (SoCs). Explore how to select the right hardware, deploy models consistently, and build voice‑enabled experiences that run locally at the edge.","tags":["Artificial Intelligence"],"lang":"English","companies":["Qualcomm"],"company":"Qualcomm","short":"Scaling Edge AI in Production"},{"day":3,"time":"16:45-18:15","stage":"XPRO Lab","title":"Building AI Agents with Spring AI","speakers":[{"name":"Sergi Almar","role":"Organizer at Spring IO"}],"description":"Building agents that actually work, ones that plan, reason, use tools, ask clarifying questions, and collaborate with other agents, requires more than just calling an LLM in a loop. It requires understanding agentic patterns and the protocols that connect them. In this workshop, we’ll build progressively more capable AI agents using Spring AI. We’ll start from the fundamentals, interacting with LLMs, crafting prompts, and working with structured output. From there, we’ll explore Retrieval Augmented Generation (RAG) for grounding responses in your own data, and tool calling for giving models the ability to take action in the real world. With these foundations in place, we’ll move into agentic territory, looking at workflow patterns and then building autonomous agents with recursive advisors and composable skills. Finally, we’ll cover the emerging agent protocol landscape: MCP for connecting agents to external tools and services, and A2A for enabling agents to discover and collaborate with each other. You’ll leave with working code and a clear understanding of how to build production-ready agents with Spring AI.","tags":["Artificial Intelligence"],"lang":"English","companies":["Spring IO"],"company":"Spring IO","short":"Spring AI Agent Development"},{"day":3,"time":"17:00-17:20","stage":"XPRO stage","title":"Network Abstraction: Powering Programmable Networks for the Agentic AI Era","speakers":[{"name":"Sridhar Gollapudi","role":"Global Telco Market Lead at Google"},{"name":"Malcolm Deck","role":"Software Engineering Manager at Google"},{"name":"Micah Baker","role":"Senior Product Manager at Google"},{"name":"Alexandru Ciinaru","role":"Product Manager Network APIs at Orange"},{"name":"Chetan Narang","role":"Head of Strategy and Innovation at Colt"}],"description":"","tags":["Future Trends"],"lang":"English","companies":["Google","Orange","Colt"],"company":"Google","short":"Programmable Networks for AI"},{"day":3,"time":"17:00-18:00","stage":"Meetup area","title":"The new era of talent access: Smarter searches, faster answers","speakers":[{"name":"Javier Redondo","role":"Head of Global Accounts at Malt"}],"description":"Javier Carrión – Global Strategic Account Executive at Malt","tags":[],"lang":"","companies":["Malt"],"company":"Malt","short":"Talent Search in Modern Era"},{"day":3,"time":"17:15-17:45","stage":"Gaming","title":"Designing in the Dark: challenges of building a game without vision","speakers":[{"name":"Aleix Muñoz","role":"Programmer & Producer en Wheel of games"}],"description":"What happens when you remove one of the most important elements in games: vision? In this session, Aleix and Xavi from Wheel of Games will explore the creative and technical challenges of developing a game designed to be played in darkness. From game design decisions to programming constraints, they will share the real difficulties of building mechanics, feedback systems, and player guidance without relying on visual clarity.","tags":["GAMING"],"lang":"English","companies":["Wheel of games"],"company":"Wheel of games","short":"Accessible Game Design"},{"day":3,"time":"17:20-17:35","stage":"XPRO stage","title":"From Zero to Network-Aware AI in 15 Minutes: Building with CAMARA MCP","speakers":[{"name":"Nick Venezia","role":"Founder of Centillion"}],"description":"In this live, hands-on session, discover how to connect AI tools like Claude, ChatGPT, and Cursor to CAMARA network APIs and start building real applications in minutes. Watch as network capabilities are explored and turned into working code using AI-assisted development. This practical demo goes beyond theory showing you how to quickly create secure, network-aware apps using the tools you already use and trust.","tags":["Future Trends"],"lang":"English","companies":["Centillion"],"company":"Centillion","short":"CAMARA MCP Network-Aware AI"},{"day":3,"time":"17:30-18:30","stage":"Hotspot Talks","title":"The New Travel Project: A value chain driving a new travel experience","speakers":[{"name":"Enric Riera","role":"Chief Customer Officer at World2Meet"},{"name":"Stefano Ceccarello","role":"Chief Digital & Experience Officer at World2Meet"},{"name":"Joan Barceló","role":"CIO at W2M"}],"description":"The New Travel Project drives innovation to improve travel in all its aspects and for all its stakeholders. In the Talent Arena roundtable, World2Meet experts will showcase how this cross-cutting vision impacts distribution, technology, marketing, and digital experience, highlighting the importance of talent and collaboration to design the future of the tourism sector.","tags":["Management"],"lang":"English","companies":["World2Meet","W2M"],"company":"World2Meet","short":"Innovative Travel Experiences"},{"day":3,"time":"17:30-18:30","stage":"Plug-in Talks","title":"Talent isn’t retained, it’s cared for: context, community, and the future of work","speakers":[{"name":"Iratxe Kaltzakorta","role":"Asociación Agile Spain - Presidenta"}],"description":"For years, we have tried to solve the so-called “talent shortage” with processes, control, and quick fixes. This talk offers a new perspective. Drawing on their experience leading Spain’s leading agile community and creating shared learning spaces, Iratxe Kaltzakorta and María Morales explore why the real challenge isn’t attracting or retaining talent, but creating environments where people want to stay, grow, and thrive.","tags":["Management"],"lang":"Spanish","companies":["Agile Spain"],"company":"Agile Spain","short":"Caring for Talent"},{"day":3,"time":"17:30-18:30","stage":"XPRO Talks","title":"Conversational Capital: The Hidden Asset Powering Agentic AI Experiences","speakers":[{"name":"Hans van Dam","role":"Founder & CEO: Conversation Design Institute & Senior Industry Research Fellow, RMIT University"}],"description":"As AI becomes agentic, conversations stop being interfaces and start becoming decision-making environments. In this talk, Hans van Dam introduces Conversational Capital: the trust, goodwill, and willingness to engage that accumulates—or collapses—through every interaction a brand has with people. Drawing on over a decade of field experience training 15,000+ professionals and working with more than 200 enterprise brands, Hans shows why most AI programs stall despite impressive technology—and how Agentic Experience Design (AXD) unlocks Conversational Capital by balancing agency and empathy at scale. This session offers a practical lens for leaders building AI systems that don’t just automate faster, but compound trust over time.","tags":["Artificial Intelligence"],"lang":"English","companies":["Conversation Design Institute"],"company":"Conversation Design Institute","short":"Conversational AI Experiences"},{"day":3,"time":"17:30-18:30","stage":"Barcelona","title":"Open Data Ecosystem in Spain: From Theory to Practice with Datos.gob","speakers":[{"name":"Daniel Ortega","role":"Head of Data Area at Red.es"}],"description":"Open data has become an essential tool to drive transparency, innovation, and the development of new digital services. In this workshop, we will explore how open data has evolved, the relevant standards and technical regulations, as well as the main challenges for its adoption and future use. The session will conclude with a hands-on AI workshop applied to Datos.gob, focusing on the use of the Model Context Protocol (MCP).","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["Red.es"],"company":"Red.es","short":"Open Data Ecosystem in Spain"},{"day":3,"time":"17:30-18:30","stage":"Skills Hub","title":"Hack Your Interview: Face Interviews with Confidence and Authenticity","speakers":[],"description":"In a tech sector where cognitive diversity drives innovation, approaching interviews with authenticity is key. Neurodiversity adds value to the recruitment process. This workshop provides practical tools for managing interviews and communication with confidence, helping neurodivergent and diverse individuals showcase their talent, strengthen self-awareness, and enter the tech sector with greater assurance.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Interview Confidence Hacks"},{"day":3,"time":"17:35-18:00","stage":"XPRO stage","title":"Hackathon Awards: Meet the Winner!","speakers":[{"name":"Hackathon Awards","role":""}],"description":"Find out who will be crowned the Open Gateway Hackathon 2026 winner! Real code, real APIs, real innovation.","tags":["Future Trends"],"lang":"English","companies":[],"company":"","short":"Hackathon Awards Ceremony"},{"day":3,"time":"17:45-17:55","stage":"XPRO stage","title":"Closing remarks / Thank you","speakers":[],"description":"Coming Soon GSMA","tags":["Future Trends"],"lang":"English","companies":[],"company":"","short":"Conference Closing Remarks"},{"day":3,"time":"18:00-18:30","stage":"Visionary Stage","title":"Real Time Powerful Visuals for Live Music","speakers":[{"name":"VJ PRIZMA","role":""}],"description":"This capsule will focus on the different types and tools for creating high-impact visuals for the music industry. This session will connect with party session, demonstrating the use of the tools live and in person.","tags":["Artificial Intelligence"],"lang":"English","companies":[],"company":"VJ PRIZMA","short":"Real-Time Music Visualization"},{"day":3,"time":"18:00-18:30","stage":"XPRO stage","title":"DSM-firmenich powered by AI","speakers":[{"name":"Alicia Saez","role":"Global Digital Innovation Leader at DSM Firmenich"}],"description":"dsm‑firmenich powered by AI explores how we combine science, creativity and technology to transform the future of scent, taste and health. We’ll share how AI accelerates innovation, enhances experiences, and empowers our teams globally, inviting talent to help shape what the world tastes, smells and feels like","tags":["Artificial Intelligence"],"lang":"English","companies":["DSM Firmenich"],"company":"DSM Firmenich","short":"DSM-firmenich AI Solutions"},{"day":3,"time":"18:00-19:00","stage":"Meetup area","title":"Gamified Networking for introverts & communities Beers","speakers":[{"name":"Julieta Zalduendo","role":"CEO & Founder at GenAI Community"},{"name":"Anna Lino","role":"Head of Community & Events at GenAI Community"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["GenAI Community"],"company":"GenAI Community","short":"Gamified Networking Events"},{"day":3,"time":"18:30-20:30","stage":"Visionary Stage","title":"Talent Arena Party by Estrella Damm","speakers":[{"name":"DJ BULMA BEAT","role":""}],"description":"In this DJ set featuring a variety of contemporary music by DJ Bulma BEAT (Apolo, Jamboree, Opium) and the Beyond Collapse VJ team will generate real-time visuals that will be displayed on screen. Additionally, a camera system will allow viewers to see the behind-the -scenes action of each JV in real time, as well as a camera connected to an AI-powered visual modification system so the audience can interact with the effects in real time and see themselves on the main screen.","tags":["Artificial Intelligence"],"lang":"English","companies":[],"company":"Estrella Damm","short":"Talent Arena Networking Party"},{"day":4,"time":"09:30-10:00","stage":"Visionary Stage","title":"Design a Career You Love in Times of Ultra-Competitiveness","speakers":[{"name":"Adri Carvajal","role":"Entrepreneur and content creator"}],"description":"At a time when artificial intelligence is completely redefining the labor market, this talk explores how to design an authentic, sustainable, and competitive career within an increasingly demanding technological environment. We will explore practical frameworks for making professional decisions with judgment, vision, and a keen sense for opportunities. The session is structured around three pillars: identifying your own talents as the foundation for a real competitive advantage, pursuing curiosity as a driver of continuous professional reinvention, and strengthening execution skills in contexts of maximum uncertainty. The talk combines personal storytelling with data and studies that provide context and rigor. Attendees will leave with a practical framework and exercises to make better career decisions and navigate the future of work with greater clarity. This session explores how to rethink your professional career during this critical window of opportunity—not only to survive in an ultra-competitive labor market but to truly enjoy your career in the years ahead.","tags":["Management"],"lang":"Spanish","companies":["Independent"],"company":"Independent","short":"Career Design Workshop"},{"day":4,"time":"09:30-10:00","stage":"XPRO stage","title":"Confessions of a Vibecoding Engineer","speakers":[{"name":"Nicolás Grenié","role":"Developer Advocate - Former Typeform at Typeform"}],"description":"AI is changing how we build software. What took weeks now happens in hours. Teams are discovering a new way of working that feels more like jamming than sprinting: “vibecoding”. Over the past year, I built dozens of AI-powered projects, some viral, some failures, all full of lessons. This talk shares stories, how AI reshapes engineering roles and workflows, and how to experiment and build at the speed of imagination.","tags":["Software Development"],"lang":"English","companies":["Typeform"],"company":"Typeform","short":"Vibecoding Confessions"},{"day":4,"time":"09:30-10:30","stage":"Meetup area","title":"How to train your own AI Telco LLM","speakers":[{"name":"Farbod Tavakkoli","role":"Data Scientist at AT&T"},{"name":"Gregory Diamos","role":"ScalarLM Architect at Relational.ai"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["AT&T","Relational.ai"],"company":"AT&T","short":"Training Telco LLM Models"},{"day":4,"time":"09:30-10:30","stage":"Hotspot Talks","title":"How Nestlé drives innovation through XR across the value chain","speakers":[],"description":"In this roundtable, we will explore how Nestlé leverages immersive technologies—such as augmented, virtual, and mixed reality—to create impact across multiple areas of the business. We will share how we identify and assess emerging technologies, how we turn them into scalable solutions integrated into our global catalogs, and how we collaborate with different teams to take an idea from early exploration to adoption in markets.","tags":["Software Development"],"lang":"English","companies":[],"company":"Nestlé","short":"XR Innovation at Nestlé"},{"day":4,"time":"09:30-10:30","stage":"Plug-in Talks","title":"Innovation in Action: Reinventing and Accelerating Innovation process with GenAI","speakers":[{"name":"Daniel González","role":"Worldline – Test Manager"},{"name":"Jose Maria Lopez Granados","role":"Worldline – Head of Business Development & Innovation"},{"name":"Santi Ristol Jorba","role":"Worldline – Head of Digital Competence Centre"},{"name":"Joan Vicent Orenga Serisuelo","role":"Worldline – Digital Competence Centre Technical Director"}],"description":"","tags":["Software Development"],"lang":"English","companies":["Worldline"],"company":"Worldline","short":"GenAI Innovation Process"},{"day":4,"time":"09:30-10:30","stage":"Barcelona","title":"HR Exchange: Inspirational Keynote","speakers":[{"name":"Tiago Santos","role":"VP of Community and Growth at Sesame HR"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Sesame HR"],"company":"Sesame HR","short":"Inspirational HR Keynote"},{"day":4,"time":"09:30-10:30","stage":"XPRO Talks","title":"The future of the Edge AI and Physical AI","speakers":[{"name":"Marc Pous Marín (moderator)","role":"Developer Relations at Edge Impulse"},{"name":"Leonardo Cavagnis","role":"Snr Firmware Engineer & Developer Advocate at Arduino"},{"name":"Louis Moreau","role":"Head of Developer Relations at Edge Impulse"},{"name":"Rajan Mistry","role":"Evangelist Lead at Qualcomm"},{"name":"Julian Caro Linares","role":"Developer Relations at Arduino"}],"description":"","tags":["ROBOTICS"],"lang":"English","companies":["Edge Impulse","Arduino","Qualcomm"],"company":"Edge Impulse","short":"Edge AI and Physical AI Future"},{"day":4,"time":"09:30-11:00","stage":"Focus Lab","title":"Build your first neural network with PyTorch","speakers":[{"name":"Alexia Salavrakos","role":"Senior Scientist at Quandela"}],"description":"In this workshop, we will first review the structure if neural networks, their history, as well as some important properties like the backpropagation algorithm. Then, we will learn how to use the python package PyTorch to implement a simple neural network and apply it to a toy dataset.","tags":["Artificial Intelligence"],"lang":"English","companies":["Quandela"],"company":"Quandela","short":"PyTorch Neural Network Tutorial"},{"day":4,"time":"09:30-11:00","stage":"XPRO Lab","title":"How to build an AI Agent for Energy Saving in 5G Networks using NVIDIA Blueprint","speakers":[{"name":"Amparo Canaveras","role":"Sr. Solutions Architect Generative AI"}],"description":"The Intent Driven Energy Saving Blueprint for 5G Networks demonstrates how Agentic AI can translate operator intent, expressed in natural language, into safe and explainable energy saving actions within a simulated 5G RAN environment. In this workshop, you will learn how to build a simple, explainable, and fully reproducible intent driven energy saving workflow for 5G networks using Agentic AI, synthetic KPI data, and a RAN simulator.","tags":["Artificial Intelligence"],"lang":"English","companies":["AWS"],"company":"AWS","short":"5G Energy Efficiency with AI"},{"day":4,"time":"09:30-11:00","stage":"Frontier lab","title":"From fRusTrait-ion to Async Mastery: Become a Rust Trait Hero in One Hour","speakers":[{"name":"Lawrece Freeman","role":"Founder / Instructor at Fledgio"}],"description":"Ever felt the fRust-ration of Rust traits? This 60-minute session dives into the unsung heroes of Rust concurrency: Send and Sync. We’ll go beyond the surface and unpack what these traits really mean, how the compiler reasons about them, and what’s actually happening under the hood when your code crosses thread boundaries.","tags":["Software Development"],"lang":"English","companies":["Fledgio"],"company":"Fledgio","short":"Rust Traits and Async Mastery"},{"day":4,"time":"09:45-10:15","stage":"Robotics","title":"Leading without rescuing: mentoring for autonomous tech teams","speakers":[{"name":"Javi Hernández Braña","role":"Leadership Services Lead at ERNI"}],"description":"Many leaders think they mentor, but actually tutor—directing, solving, and protecting. This creates dependency and limits growth. In fast-changing tech environments, teams need autonomy and accountability. This talk explores shifting to a mentoring mindset that challenges, empowers, and leads adults as adults—not as children with job titles.","tags":["ROBOTICS"],"lang":"English","companies":["ERNI"],"company":"ERNI","short":"Autonomous Team Mentoring"},{"day":4,"time":"10:00-10:30","stage":"XPRO stage","title":"From Prototype to Product: Operationalizing Generative Personalization at Scale","speakers":[{"name":"Francesco Fabbri","role":"Research Scientist at Spotify"}],"description":"Generative AI is reshaping personalization by making user experiences more expressive, intent-driven, and increasingly defined in natural language. Outputs become open-ended, contextual, and fine-grained, which disrupts much of the evaluation infrastructure that large-scale personalization has historically relied on. In these settings, “ground truth” is often underspecified, and quality depends on criteria like relevance, coherence, and user alignment rather than exact-match correctness. Yet human review and user studies do not scale. This talk explores LLM-as-a-Judge as a practical evaluation layer for generative and agentic systems. Drawing on recent research and public case studies, including published work from Spotify, we discuss how LLM-based judges can approximate human judgments, connect offline evaluation with human perception, and support meaningful assessment in low-feedback and cold-start settings. We then move from evaluation to optimization. When the judge signal is reliable, it can serve as an alignment signal for post-training and as a driver for automatic prompt and context optimization, enabling systematic comparisons, regression detection, and faster iteration cycles toward production-ready behavior.","tags":["Artificial Intelligence"],"lang":"English","companies":["Spotify"],"company":"Spotify","short":"Personalization at Scale"},{"day":4,"time":"10:00-10:30","stage":"Meetup area","title":"Sewing AI: Innovation in Web Application Development with AI","speakers":[{"name":"Alberto Valiña Lema","role":"Principal Engineer at Inditex"}],"description":"Discover how Sewing AI is revolutionizing web application development atInditex. This innovative platform leverages artificial intelligence to simplify and accelerate the creation of interactive prototypes, enabling teams to transform ideas into digital products quickly and efficiently. Sewing AI focuses on delivering visual results with the expertise of a UX specialist, while maintaining technical quality through a production-ready philosophy.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["Inditex"],"company":"Inditex","short":"AI Web Application Development"},{"day":4,"time":"10:00-11:00","stage":"Skills Hub","title":"Back to Your Future: get ready for the tech market","speakers":[{"name":"Javier Martínez","role":"Leader – Claire Joster Technology en Claire Joster"},{"name":"José María Flores","role":"Regional Leader – Madrid en Claire Joster"},{"name":"Jordi Llahí","role":"Sales and Marketing Leader en Claire Joster"},{"name":"Jordi Valls","role":"Senior Consultant 360 en Claire Joster"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Claire Joster"],"company":"Claire Joster","short":"Tech Job Market Preparation"},{"day":4,"time":"10:30-10:35","stage":"Hotspot Talks","title":"NEXT HR – Welcome","speakers":[{"name":"Nacho Borrás","role":"Head of People at Mobile World Capital Barcelona"}],"description":"Coming Soon NEXT HR – Welcome","tags":["Management"],"lang":"Spanish","companies":["Mobile World Capital Barcelona"],"company":"Mobile World Capital Barcelona","short":"NEXT HR Conference Welcome"},{"day":4,"time":"10:30-11:00","stage":"Visionary Stage","title":"Creative Coding to demystify Technology","speakers":[{"name":"Tim Roedenbroker","role":"Founder of TRCC"}],"description":"How coding empowers innovators to make sense of and design for a world in constant change.","tags":["Software Development"],"lang":"English","companies":["TRCC"],"company":"TRCC","short":"Creative Coding for Learning"},{"day":4,"time":"10:30-11:00","stage":"Gaming","title":"Final Magamers","speakers":[{"name":"Magas","role":""}],"description":"Live broadcast space from the Gaming Zone at the Talent Arena, where casters Jackalsito and Katarsis will guide the audience through the on-site Grand Final of Magamers 2026, the women’s League of Legends tournament promoted by EL ESPAÑOL, Magas, Vandal, and Crónica Global, and integrated into the amateur competitive ecosystem of Circuito Tormenta. Across three slots, the audience will be welcomed, the finalist teams will be introduced, and the different matches will be presented, providing context, key insights for each matchup, and live connections with the on-screen broadcast to experience the final from the inside.","tags":["GAMING"],"lang":"Spanish","companies":["Magamers"],"company":"Magamers","short":"Magamers Final Ceremony"},{"day":4,"time":"10:30-11:30","stage":"XPRO Talks","title":"Turning Silos into Synergy Through InnerSource","speakers":[{"name":"Ana Gamito","role":"Open Source Program Manager - AXA Group"}],"description":"InnerSource applies open source development principles inside an organization, enabling teams to collaborate across silos, share reusable components, and accelerate innovation. In this session, we’ll explore what InnerSource is, why it matters, and how it transforms the way companies build software. You’ll learn practical steps to start an InnerSource initiative, overcome common challenges, and foster a culture of transparency and shared ownership.","tags":["Software Development"],"lang":"English","companies":["AXA Group"],"company":"AXA Group","short":"InnerSource Collaboration"},{"day":4,"time":"10:30-11:30","stage":"Plug-in Talks","title":"Beyond the Code: Skills That Drive Innovation","speakers":[{"name":"Ainoa Irurre, Europe Talent Attraction Vice President  at Schneider Electric","role":""},{"name":"Laura Sancho, Director IT Iberia & Project Management Officer at Schneider Electric","role":""},{"name":"Yolanda Triviño, CEO Institute for Futures Futures at Institute for Futures Futures","role":""},{"name":"Joana Barbany, Technology Business Development Director at Michael Page","role":""}],"description":"","tags":["Management"],"lang":"English","companies":["Schneider Electric","Institute for Futures Futures","Michael Page"],"company":"Schneider Electric","short":"Innovation-Driving Skills"},{"day":4,"time":"10:30-11:30","stage":"Barcelona","title":"Challenge Next Arena project presentations","speakers":[],"description":"The objective of the challenge is to rethink Talent Arena for 2027. Imagine and design how this event should evolve in order to remain relevant, inspiring, and transformative. As part of the NextArena Challenge, several student teams will present the projects they have developed to define how Talent Arena can evolve to become the leading global forum for digital talent. Proposals should address different strategic areas, combining creativity and innovation with analysis and a forward-looking vision, while taking into account the objectives outlined above. Participants are expected to design an experience that connects with new generations, delivers value to senior professionals, drives innovation, and leaves a lasting impact on the European digital ecosystem. In this context, the challenge aims to open its strategy to innovative ideas and differentiated proposals for the 2027 edition, using the previously described elements as a reference and aligning with the strategic and future-oriented vision that is being defined.","tags":["Management"],"lang":"English","companies":[],"company":"","short":"Next Arena Challenge Projects"},{"day":4,"time":"10:35-11:05","stage":"Hotspot Talks","title":"NEXT HR – Talent Magnetism: Employer Branding & Talent Acquisition","speakers":[],"description":"Attracting digital talent is no longer just about offering competitive salaries or posting job openings. This panel explores how organizations can become talent magnets through an authentic Employee Value Proposition (EVP) aligned with their culture and values. Using real-world examples, it will cover what tech professionals are looking for today and how to stand out through purpose, projects, leadership, and employer branding built from within.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Talent Magnetism and Branding"},{"day":4,"time":"11:00-11:30","stage":"XPRO stage","title":"Are agents the evolution of microservices?","speakers":[{"name":"Marcia Villalba Monné","role":"Serverless Developer & Educator"}],"description":"Microservices changed how we build software, but AI agents are changing what software can do. In this talk, we will explore how agents can become the new cognitive microservices, capable of reasoning and acting within distributed systems. You’ll see demos with AWS serverless services that will help you understand how this new intelligent layer is transforming modern architecture.","tags":["Cloud Computing"],"lang":"Spanish","companies":["AWS"],"company":"AWS","short":"Agents vs Microservices Evolution"},{"day":4,"time":"11:00-11:30","stage":"Visionary Stage","title":"From “promstitution” to impact. How developers stay essential in the age of AI","speakers":[{"name":"David Pereira","role":"Global Head of Data & AI at Seidor"}],"description":"In a world where anyone can automate software generation with AI, code no longer makes the difference. When intelligent agents are within everyone’s reach, the real value lies in knowing what to do with them. In this session, we will analyze why delegating everything to AI is not the solution, discuss human agency, and share tips on what makes developers stand out so they can remain relevant and deliver greater value where AI cannot.","tags":["Software Development"],"lang":"Spanish","companies":["Seidor"],"company":"Seidor","short":"Devs Staying Essential"},{"day":4,"time":"11:05-11:30","stage":"Hotspot Talks","title":"NEXT HR – Market Intelligence for HR: HR Market Radar","speakers":[{"name":"Jordi Arcas","role":"CEO at TalentUp.io"}],"description":"Market data has become a key factor in guiding digital talent management. This session will examine how the use of objective data and its interpretation enables informed decision-making in areas such as compensation, critical skills, talent location, and workforce planning, integrating a practical view of the current market while anticipating its future impact.","tags":["Management"],"lang":"Spanish","companies":["TalentUp.io"],"company":"TalentUp.io","short":"HR Market Intelligence Radar"},{"day":4,"time":"11:15-11:45","stage":"Robotics","title":"AI @ PAL Robots","speakers":[{"name":"Sergi de las Muelas","role":"Robotics Engineer at PAL Robotics"}],"description":"This presentation explores how artificial intelligence is driving the development of humanoid robotics. We will examine the most widely used techniques and see how they are integrated into these systems, demonstrating how they enable robots to be more adaptive, safe, and collaborative. The session will also reflect on the potential of these technologies to improve daily life, assist with complex tasks, and expand human capabilities.","tags":["ROBOTICS"],"lang":"Spanish","companies":["PAL Robotics"],"company":"PAL Robotics","short":"AI in PAL Robotics"},{"day":4,"time":"11:15-12:45","stage":"Focus Lab","title":"AI Models for Marketing & Growth Strategy​","speakers":[{"name":"Armando Salvador","role":"EAE Business School - Master in Marketing & Growth Hacking Director"}],"description":"In this hands-on session, we will demonstrate how to use AI models to design and execute real marketing and growth strategies, regardless of experience level. Through clear examples and applied use cases, participants will learn how to select models, structure prompts, and build workflows that help attract, convert, and optimize business decisions. Applied AI you can start using from day one.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["EAE Business School"],"company":"EAE Business School","short":"AI Models for Marketing Growth"},{"day":4,"time":"11:15-12:45","stage":"XPRO Lab","title":"Computer Vision with Arduino UNO Q: From Edge AI to VLMs","speakers":[],"description":"Join an interactive, hands-on workshop to explore Computer Vision on the edge using Edge Impulse and Arduino UNO Q. Learn how to collect data and train an object detection model to filter events in real time, then cascade to a Vision Language Model. No prior ML experience required. You’ll build an end-to-end cascaded AI application in the edge, balancing power efficiency and accuracy on real hardware. Bring your laptop and your curiosity!","tags":["Artificial Intelligence"],"lang":"English","companies":[],"company":"Arduino","short":"Arduino Computer Vision Project"},{"day":4,"time":"11:15-12:45","stage":"Robotics","title":"How to train your robot","speakers":[{"name":"Asier Arranz","role":"Senior Staff Developer Advocate atNVIDIA"},{"name":"Jesús Ángel Bravo Duque","role":"Founder & CEO atBravo Robots"},{"name":"Johnny Nuñez","role":"Developer Advocate at NVIDIA"},{"name":"Luis Bravo","role":"Engineer at Bravo Robots"}],"description":"In this workshop, attendees will learn how to use the Lerobot framework and apply it to train a Lerobot SO-101 Arm. Official github: https://github.com/huggingface/lerobot/issues Buy the robot here: https://tienda.camptecnologico.com/producto/so-arm101-diy-kit-orange/","tags":["ROBOTICS"],"lang":"Spanish","companies":["NVIDIA","Bravo Robots"],"company":"NVIDIA","short":"Robot Training Techniques"},{"day":4,"time":"11:30-12:00","stage":"Visionary Stage","title":"From Adoption to Impact: How Adoption Accelerates AI & Cloud Transformation in Enterprise Teams","speakers":[{"name":"Tammy Okwara","role":"Cloud Solutions Architect at Microsoft & Founder at Purplebook"}],"description":"Enterprises invest heavily in AI and cloud, yet struggle to realize value due to adoption gaps, not technology. This talk shares practical frameworks from enterprise and SaaS programs to improve onboarding, role-based training, and success metrics that accelerate adoption, reduce time-to-value, and drive sustained business impact.","tags":["Cloud Computing"],"lang":"English","companies":["Microsoft & Founder at Purplebook"],"company":"Microsoft & Founder at Purplebook","short":"AI and Cloud Transformation"},{"day":4,"time":"11:30-12:00","stage":"XPRO stage","title":"What Does It Take to Build a Real-Time Data Platform?","speakers":[{"name":"Melvyn Peignon","role":"Principal Product Manager at Clickhouse"}],"description":"Modern AI systems—from recommendation engines to autonomous LLM agents—depend on fast, reliable access to fresh data. Feature retrieval, contextual enrichment, analytics, and observability all require sub-second responses, even at terabyte or petabyte scale, to deliver truly interactive experiences. In this session, we’ll explore how ClickHouse enables real-time analytics at scale and how it fits into end-to-end AI architectures.","tags":["Cloud Computing"],"lang":"English","companies":["Clickhouse"],"company":"Clickhouse","short":"Real-Time Data Platform"},{"day":4,"time":"11:30-12:00","stage":"Hotspot Talks","title":"NEXT HR –  Smart Hiring: AI-driven automation in tech talent recruitment","speakers":[],"description":"Artificial intelligence is transforming digital talent recruitment processes. This session will explore the opportunities and challenges these tools present for HR teams, as well as their ethical and effective application. It will also examine the balance between technological efficiency, candidate experience, and human judgment, focusing on AI-augmented, people-centered decision-making.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"AI-Driven Smart Hiring"},{"day":4,"time":"11:30-12:30","stage":"Meetup area","title":"Building an AI Agent and Simulating 6G with NVIDIA","speakers":[{"name":"Amparo Canaveras","role":"Sr. Solutions Architect Generative AI at NVIDIA"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["NVIDIA"],"company":"NVIDIA","short":"6G Simulation with NVIDIA AI"},{"day":4,"time":"11:30-12:30","stage":"Plug-in Talks","title":"A More Accessible and Democratic Open-Source AI","speakers":[{"name":"Ángela Gasch (Moderator)","role":"AI Consultant at SEDIA"},{"name":"Rebeca Sarai Gonzalez Guerra","role":"Lead Data Scientist & AI Architect at Hiberus"},{"name":"Adriana Fernández","role":"Head of the Telco Cloud & AI Innovation Team at OpenNebula"},{"name":"Alejandra González-García","role":"Member of the Coordination Committee at Decidim"}],"description":"Panel discussion with organizations that develop, use, and advocate for open-source AI. We will discuss, from a technical and practical perspective, why open source is essential for accessible and transparent AI. A direct conversation about technology and how open source is shaping the future of AI.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["SEDIA","Hiberus","OpenNebula","Decidim"],"company":"SEDIA","short":"Open-Source AI Accessibility"},{"day":4,"time":"11:30-12:30","stage":"Barcelona","title":"Challenge Next Arena project presentations","speakers":[],"description":"The objective of the challenge is to rethink Talent Arena for 2027. Imagine and design how this event should evolve in order to remain relevant, inspiring, and transformative. As part of the NextArena Challenge, several student teams will present the projects they have developed to define how Talent Arena can evolve to become the leading global forum for digital talent. Proposals should address different strategic areas, combining creativity and innovation with analysis and a forward-looking vision, while taking into account the objectives outlined above. Participants are expected to design an experience that connects with new generations, delivers value to senior professionals, drives innovation, and leaves a lasting impact on the European digital ecosystem. In this context, the challenge aims to open its strategy to innovative ideas and differentiated proposals for the 2027 edition, using the previously described elements as a reference and aligning with the strategic and future-oriented vision that is being defined.","tags":["Management"],"lang":"English","companies":[],"company":"","short":"Next Arena Challenge Projects"},{"day":4,"time":"11:30-12:30","stage":"XPRO Talks","title":"Scaling Science at large facilities: ALBA and BSC","speakers":[{"name":"Oscar Matilla","role":"Computing Division Head at ALBA Synchrotron"}],"description":"The Barcelona Supercomputing Center (BSC) and the ALBA Synchrotron are two major research hubs located in Barcelona. ALBA, a particle accelerator for experimental science, produces huge volumes of ultra-high-resolution data. BSC, the Spain’s national supercomputing center, hosts the MareNostrum and multiple research groups. This talk will examine the essential role of computing in driving the frontier of scientific discovery.","tags":["Cloud Computing"],"lang":"English","companies":["ALBA Synchrotron"],"company":"ALBA Synchrotron","short":"Scaling Scientific Research"},{"day":4,"time":"11:30-12:30","stage":"Skills Hub","title":"Immersive Interview Experience: Live a Real Interview","speakers":[],"description":"The job interview is a demanding process that requires preparation and strategy. Through a hands-on, “training mode” experience, participants can practice, improve their pitch, and gain confidence to perform at their best in a real interview. In this workshop, you will find the most realistic simulator to help you avoid mistakes in an actual job interview.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Live Interview Experience"},{"day":4,"time":"12:00-12:20","stage":"Hotspot Talks","title":"NEXT HR – Rethinking Access to Digital Talent","speakers":[{"name":"Héctor Mata","role":"Founder & CEO at Shakers"}],"description":"Access to digital talent is evolving due to imbalances between profiles, increasing demand for specialization, and the prioritization of experienced profiles over the development of early-stage talent. This session will address new ways to identify and activate talent beyond traditional hiring, from early potential detection to flexible collaboration models, and their strategic implications for HR.","tags":["Management"],"lang":"English","companies":["Shakers"],"company":"Shakers","short":"Digital Talent Access"},{"day":4,"time":"12:00-12:30","stage":"Visionary Stage","title":"The Future of Enterprise AI Governance","speakers":[{"name":"Oliver Patel","role":"Head of Enterprise Artificial Intelligence Governance at AstraZeneca"}],"description":"AI is now democratized, reshaping every role and organization. As it becomes embedded in work, how do we keep it trustworthy, compliant, and safe? Enterprise AI Governance is critical, yet most organizations are just beginning. Oliver Patel, who leads AI governance at AstraZeneca and authored Fundamentals of AI Governance, shares how regulations are evolving, why AI literacy is essential, and how agentic AI changes the game.","tags":["Cybersecurity"],"lang":"English","companies":["AstraZeneca"],"company":"AstraZeneca","short":"Enterprise AI Governance"},{"day":4,"time":"12:00-12:30","stage":"Gaming","title":"Final Magamers","speakers":[{"name":"Magas","role":""}],"description":"Live broadcast space from the Gaming Zone at the Talent Arena, where casters Jackalsito and Katarsis will guide the audience through the on-site Grand Final of Magamers 2026, the women’s League of Legends tournament promoted by EL ESPAÑOL, Magas, Vandal, and Crónica Global, and integrated into the amateur competitive ecosystem of Circuito Tormenta. Across three slots, the audience will be welcomed, the finalist teams will be introduced, and the different matches will be presented, providing context, key insights for each matchup, and live connections with the on-screen broadcast to experience the final from the inside.","tags":["GAMING"],"lang":"Spanish","companies":["Magamers"],"company":"Magamers","short":"Magamers Final Ceremony"},{"day":4,"time":"12:00-13:00","stage":"XPRO stage","title":"20,000 Blunders in Tech Leadership","speakers":[],"description":"The odyssey of the technical leader begins with a brilliant engineer who, after being called to cross the “technical career chasm,” must abandon their identity as a “chef in the kitchen” focused on code in order to learn how to achieve results through the hands of others. In this “choose your own adventure” labyrinth, our hero faces monsters such as technical debt, which they must learn to translate into the financial language of spreadsheets in order to fight it strategically. Through the trials of the “You Build It, You Run It” philosophy and the demolition of organizational silos, they discover that their true strength lies in automation and shared product ownership. By invoking sacred tools such as “Priority Buckets” and OKRs to align their tribe with business objectives, and by applying the balm of blameless postmortems to transform mistakes into systemic learning, the leader returns transformed into the glue that binds technical talent with strategic vision. Ultimately, the journey reveals that their mission is not only to plant technological “baby trees” for the future, but also to safeguard their own mental health and that of their team at the lonely summit of leadership. In this presentation, Àlex Rodríguez Bacardit and colleagues will discuss the complex path to technological leadership and share some of their greatest successes and failures.","tags":["Software Development"],"lang":"Spanish","companies":[],"company":"","short":"Tech Leadership Lessons"},{"day":4,"time":"12:20-13:00","stage":"Hotspot Talks","title":"NEXT HR – Grow to Stay: Developing Digital Talent to Improve Retention","speakers":[],"description":"Retaining digital talent is one of the main challenges facing HR teams today. Drawing on real-world experiences, this session will explore how professional development, upskilling, and continuous learning serve as key levers to strengthen engagement and retention. The focus will be on practical approaches that connect skills development with talent motivations and organizational needs.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Digital Talent Development"},{"day":4,"time":"12:30-13:00","stage":"Visionary Stage","title":"The Power of Sharing: How Open Source Quietly Runs the World","speakers":[{"name":"Arnau Oncins Rodriguez","role":"Enterprise Architect at Allianz"}],"description":"In this session, we will show how advocating OSS/Inner Source adoption at Allianz Technology. Using DORA + BaFin regulations as catalyst, OpenSource adoption can turn compliance into a competitive advantage. With a data-driven approach, implementing an Open Source Program Office (OSPO) drives immediate ROI (44-60% cost savings, 25-40% faster delivery).","tags":["Software Development"],"lang":"English","companies":["Allianz"],"company":"Allianz","short":"Open Source Power"},{"day":4,"time":"12:30-13:30","stage":"Meetup area","title":"Tapas & Observability: Connect, Chat, Enjoy","speakers":[{"name":"Nacho Cougil","role":"Principal Software Engineer at Dynatrace"}],"description":"","tags":["Artificial Intelligence"],"lang":"English","companies":["Dynatrace"],"company":"Dynatrace","short":"Observability and Networking"},{"day":4,"time":"12:30-13:30","stage":"Plug-in Talks","title":"Management and leadership: STEM intergeneracional","speakers":[{"name":"Amaia Zarranz","role":"Technical Solution – Caixabank Tech"},{"name":"Maria Engracia Guillamon Bagan","role":"Directora Cibersecurity Prevent&Detect – Caixabank"},{"name":"Claudia Platel","role":"Product Manager Analítica i venta digital – Caixabank"},{"name":"Lourdes Mercadal","role":"Directora Development – CaixaBank Tech"}],"description":"","tags":[],"lang":"English","companies":["CaixaBank Tech","CaixaBank"],"company":"CaixaBank","short":"Intergenerational STEM Leadership"},{"day":4,"time":"12:30-13:30","stage":"XPRO Talks","title":"From Zero to Hero: Cybersecurity Certification with Cisco and Barcelona Activa","speakers":[{"name":"Humbert Ruiz (Moderator)","role":"Director of Digital Talent atBarcelona Activa"},{"name":"Xavier Massa","role":"Director, Public Sector Spain atCISCO"},{"name":"Maria Barragan","role":"SIRT, Organizational Change Management"},{"name":"Paola Arrabal Agüera","role":"Office of the Director and Institutional Relations atInstituto Nacional de Ciberseguridad"}],"description":"Presentation of the Cybersecurity track of the IT Academy. This roundtable will explain the public-private collaboration that makes this training possible, designed byBarcelona Activa, with the participation ofCISCO, which provides students access to its Cisco Networking Academy, and SIRT, a leading cybersecurity company that facilitates official student certification. The event will also feature the presence ofINCIBE.","tags":["Cybersecurity"],"lang":"Spanish","companies":["Barcelona Activa","Cisco","SIRT","INCIBE"],"company":"Cisco","short":"Cybersecurity Certification"},{"day":4,"time":"12:45-13:15","stage":"Robotics","title":"PUCRA: University Students Competing in High-Level Robotics","speakers":[{"name":"Elena Villalba Aguilera","role":"ERC Team Leader atPUCRA"},{"name":"Santiago Pallarès Ocampo","role":"President of PUCRA"},{"name":"Marc Redolad Ramos","role":"Treasurer of PUCRA"}],"description":"PUCRA is a university association formed by engineering students who design and build robots for national and international competitions. This session presents the team’s experience in the VEX robotics competition, the SENER competition and the return to the European Rover Challenge (ERC) competition, explaining the rules, technical challenges, and current project status.","tags":["ROBOTICS"],"lang":"English","companies":["PUCRA"],"company":"PUCRA","short":"Student Robotics Competition"},{"day":4,"time":"13:00-13:25","stage":"Hotspot Talks","title":"NEXT HR – Data-Driven People: Analytics per decisions de talent","speakers":[{"name":"Pol Luengo","role":"Global Leadership and Talent Analytics at Unilever"}],"description":"Decisions on how to manage and develop talent are no longer linear, and HR analytics has become a key factor in strengthening them. Using real-world examples, this session will show how People Analytics can improve retention, performance, the identification of development needs, and workforce planning, connecting people data with actionable business decisions for everyday HR operations.","tags":["Management"],"lang":"Spanish","companies":["Unilever"],"company":"Unilever","short":"People Analytics for Talent"},{"day":4,"time":"13:00-13:30","stage":"Visionary Stage","title":"Invisible Technology","speakers":[{"name":"Edgar Pons","role":"CEO at NutriBrain"}],"description":"Twenty years ago, technology was noisy: beeping modems, loading times, instruction manuals. Today, the goal is “Zero UI”: technology that is everywhere, but invisible. What does it take to achieve that invisibility? It requires projecting 30,000 invisible points of light onto your face, synchronizing atomic clocks in orbit, and embedding microscopic physical machines inside a chip. In this session, we will examine the technical miracles that users take for granted, and how technology performs magic in our everyday lives.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["NutriBrain"],"company":"NutriBrain","short":"Invisible Technology Discussion"},{"day":4,"time":"13:00-13:30","stage":"XPRO stage","title":"AI Lift-off: Escaping Prototype Gravity to Reach Production Orbit","speakers":[{"name":"Nereida Agüera","role":"Solutions Architect at Databricks"}],"description":"Most AI-powered prototypes never make it to production, but why? In this session, we’ll explore the hidden forces that stall AI projects, from fragile data foundations and lack of unified governance to prioritizing the never-ending chase of the ‘best’ model over rigorous evaluation and actionable data intelligence. Learn how enterprises are overcoming these hurdles to turn experiments into production-ready AI that delivers real impact – no spacesuits required!","tags":["Software Development"],"lang":"English","companies":["Databricks"],"company":"Databricks","short":"AI from Prototype to Production"},{"day":4,"time":"13:00-14:00","stage":"Skills Hub","title":"Hack Your CV: Key Tips to Optimize Your CV and Beat AI Filters","speakers":[],"description":"In today’s recruitment processes, many résumés are automatically filtered before reaching human hands. Understanding how these systems work is key to improving job opportunities. This workshop provides practical tools and strategies to adapt your CV to AI filters, aiming especially to empower unemployed individuals, people with diverse profiles, or those in vulnerable situations.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"CV Optimization for AI Filters"},{"day":4,"time":"13:00-14:30","stage":"Focus Lab","title":"AI in Supply Chain/Operations: How to Deliver More Value in an Unstable World","speakers":[{"name":"Miquel Serracanta","role":"Master in Supply Chain Director, EAE Business School"}],"description":"Practical workshop for undergraduate/graduate students, active professionals, and anyone looking to start a career in Operations/Supply Chain (including Purchasing, Procurement, Production, Logistics, Transportation, Demand & Supply Planning, Customer Service). Through individual exercises and small team challenges, you will discover how to turn AI into a real competitive advantage: you will identify high-impact opportunities, learn to prioritize them with strategic judgment, and transform them into measurable business results as well as a direct accelerator for your own career, working on prompting through practical exercises applied to real situations. We will close the workshop by creating a 30-day individual plan to enhance your current and future employability based on the AI experiences, in an increasingly uncertain and unstable global context. Important: Bring your laptop with your preferred AI agent installed/connected.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["EAE Business School"],"company":"EAE Business School","short":"AI in Supply Chain Operations"},{"day":4,"time":"13:00-14:30","stage":"Frontier lab","title":"Build Your Own AI Agent – From Theory to Practice","speakers":[],"description":"In this workshop, you will discover the theoretical foundations behind AI agents and learn, step by step, how to develop and customize them. You will experience a hands-on, interactive session, working with real examples to fine-tune your agents’ performance. No prior experience is needed—just curiosity, a willingness to learn, and a desire to explore new ways of working with artificial intelligence.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":[],"company":"","short":"Building AI Agents Practically"},{"day":4,"time":"13:00-14:30","stage":"XPRO Lab","title":"How to Simulate 6G in the Cloud with Highly-Realistic Channel Models","speakers":[{"name":"CC Chong","role":"Sr. Director and Head of Aerial Product Management"}],"description":"Wireless network digital twins are key to AI-native 6G networks, which will be born first in simulation. Legacy stochastic models face fundamental challenges in physical accuracy and ISAC needs. NVIDIA Aerial Omniverse Digital Twin (AODT) employs GPU raytracing for physics-accurate 6G modeling. In this session, we will show how to integrate AODT into simulation workflows, enabling cloud-based AI-for-RAN validation and realistic network deployment","tags":["Artificial Intelligence"],"lang":"English","companies":["Keysight Technologies"],"company":"Keysight Technologies","short":"6G Cloud Simulation Models"},{"day":4,"time":"13:25-13:30","stage":"Hotspot Talks","title":"NEXT HR – Closing","speakers":[{"name":"Nacho Borrás","role":"Head of People at Mobile World Capital Barcelona"}],"description":"Coming Soon NEXT HR","tags":["Management"],"lang":"Spanish","companies":["Mobile World Capital Barcelona"],"company":"Mobile World Capital Barcelona","short":"NEXT HR Closing Session"},{"day":4,"time":"13:30-14:00","stage":"XPRO stage","title":"AI That Ships: Powering the Next Wave of AI PCs with Generative AI at the Edge","speakers":[{"name":"Jordina Torrents Barrena","role":"Senior AI Manager and Principal AI Architect at HP"}],"description":"Building AI demos is easy; shipping AI products is hard. This talk shows how HP is unleashing GenAI on next-gen AI PCs, delivering powerful, secure, private, and energy-efficient on-device intelligence. Explore multimodal models optimized via fine-tuning, quantization, hybrid CPU/GPU/NPU orchestration, beyond transformer-based architectures like state-space models, and advanced assessment frameworks shaping next-gen AI experiences.","tags":["Artificial Intelligence"],"lang":"English","companies":["HP"],"company":"HP","short":"AI PCs with Edge Computing"},{"day":4,"time":"13:30-14:00","stage":"Visionary Stage","title":"AI Across the Pharmaceutical Value Chain","speakers":[{"name":"Xabier Morales Ferez","role":"Data Scientist R&D Lead"}],"description":"The pharmaceutical industry is at a turning point, with long, costly drug development cycles. At Sanofi Digital R&D, AI is transforming the full value chain — from molecular design and advanced imaging to clinical trials and digital biomarkers. By accelerating decisions and improving outcomes, AI is reimagining how medicines are discovered and developed.","tags":["Artificial Intelligence"],"lang":"English","companies":["Sanofi"],"company":"Sanofi","short":"AI in Pharmaceutical Industry"},{"day":4,"time":"13:30-14:00","stage":"Gaming","title":"Final Magamers","speakers":[{"name":"Magas","role":""}],"description":"Live broadcast space from the Gaming Zone at the Talent Arena, where casters Jackalsito and Katarsis will guide the audience through the on-site Grand Final of Magamers 2026, the women’s League of Legends tournament promoted by EL ESPAÑOL, Magas, Vandal, and Crónica Global, and integrated into the amateur competitive ecosystem of Circuito Tormenta. Across three slots, the audience will be welcomed, the finalist teams will be introduced, and the different matches will be presented, providing context, key insights for each matchup, and live connections with the on-screen broadcast to experience the final from the inside.","tags":["GAMING"],"lang":"Spanish","companies":["Magamers"],"company":"Magamers","short":"Magamers Final Ceremony"},{"day":4,"time":"13:30-14:30","stage":"Meetup area","title":"Rust Iberia Meetup: Building an Agent from Scratch Using Rust and Open‑Source Tools","speakers":[{"name":"Lawrence Freeman","role":"Founder/Instructor at Fledgio"}],"description":"","tags":["Software Development"],"lang":"English","companies":["Fledgio"],"company":"Fledgio","short":"Rust Agent Development"},{"day":4,"time":"13:30-14:30","stage":"XPRO Talks","title":"Live Coding: Create your first Voice Agent","speakers":[{"name":"Ismael Ordaz Reyes","role":"SLNG.ai - Co-founder & CTO"}],"description":"In this live-coding session, we’ll build a simple voice agent step by step: handling audio, reasoning with an LLM, and calling tools in real time (fetching web data, reading from PDFs, triggering actions). No slides—just code. You’ll leave with a clear mental model of how voice agents work and how to extend them beyond scripted conversations.","tags":["Software Development"],"lang":"English","companies":["SLNG.ai"],"company":"SLNG.ai","short":"Voice Agent Development"},{"day":4,"time":"13:30-14:30","stage":"Hotspot Talks","title":"AI with Purpose: Ethics that Transform Talent Management","speakers":[{"name":"Anna Golsa","role":"CEO of Eurofirms"}],"description":"Eurofirms Group and Telefónica Tech share a success story of purpose-driven innovation: how generative AI, designed around values, is transforming talent selection with fairer, scalable and more human processes, where technology supports and human decision-making remains in control. In addition, you will discover the tech trends that will redefine the relationship between talent and technology in the coming years.","tags":["Management"],"lang":"English","companies":["Eurofirms"],"company":"Eurofirms","short":"Ethical AI in Talent Management"},{"day":4,"time":"13:30-14:30","stage":"Plug-in Talks","title":"Building the AI Generation. Empowering Research Talent","speakers":[],"description":"TheBuilding the AI Generationinitiative, part ofGeneración Dand promoted byRed.estogether withCSIC,Barcelona Supercomputing Center,CNIOandCNIC, has enabled the recruitment of 374 researchers in artificial intelligence and digitalization applied to multiple scientific fields. In this panel, representatives and researchers from CSIC and CNIC will discuss the evolution of the program and present some of the most relevant research projects currently under development.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":[],"company":"","short":"AI and Research Talent"},{"day":4,"time":"13:30-14:30","stage":"Barcelona","title":"Responsible and Secure AI: Protect Your Organization in the Era of Generative AI","speakers":[{"name":"Nadya Lozada Oliveros","role":"Project Manager / Cloud Architect at GFT (Moderator)"},{"name":"Miguel Fernández Garrido","role":"Co-Head of the Cybersecurity CoE at GFT Spain"},{"name":"Eduardo Gonzalez Lainez","role":"Information Security Director at Banc Sabadell"},{"name":"Alex Jiménez de Alier","role":"Head of Cyber Prevention at Boehringer Ingelheim"}],"description":"Generative AI is transforming organizations, enabling efficiency, automation and new ways of building software. However, major risks remain, including data leakage, model attacks, hallucinations, AI lifecycle security, regulatory compliance and ethical challenges. In this roundtable, experts from GFT and industry leaders share practical guidance on responsible implementation, security by design and safe use of generative AI in production.","tags":["Cybersecurity"],"lang":"English","companies":["GFT","GFT Spain","Banc Sabadell","Boehringer Ingelheim"],"company":"GFT","short":"Responsible AI Security"},{"day":4,"time":"14:00-14:30","stage":"Visionary Stage","title":"The anticulture of urgency: How to avoid the immediate-response syndrome","speakers":[{"name":"Jose Carlos del Sol","role":"Scrum Master at Wordline"}],"description":"Many IT teams live in a constant sense of urgency: messages in Teams that demand immediate responses, emails that can’t wait, emergency meetings. But is it really all that urgent? This talk will address how the pressure of immediacy affects productivity and team mental health, and present strategies for slowing down without losing efficiency. We will look at some techniques and how to apply them in our day-to-day work.","tags":["Management"],"lang":"English","companies":["Wordline"],"company":"Wordline","short":"Managing Workplace Urgency"},{"day":4,"time":"14:00-14:30","stage":"XPRO stage","title":"Leading a Technical Revolution through Platform Engineering","speakers":[{"name":"Anastasia Kondratrieva","role":"Platform Area Lead and Cloud Security Advocate at Tymit"}],"description":"Technical revolutions rarely start with big launches or visible announcements. More often, they begin deep within an organization — where architectures are defined, processes are automated, and decisions are made that few notice but ultimately shape the company’s speed, security, and capacity to grow. In this talk, Anastasia Kondratieva shares what it really means to lead that kind of transformation through Platform Engineering, combining strategy with hands-on technical execution. Through real examples —evolving infrastructure, designing internal platforms, making governance and automation decisions— she explores how the often invisible work of platform teams can become a tangible driver of organizational change. The session also looks at how to align technology with culture and maintain coherence as an organization scales and evolves, showing that a well-executed technical revolution is not built on chaos but on clarity — on decisions that scale, automations that endure, and platforms that propel the entire company forward. Key takeaways: How architectural and technical decisions can drive organizational transformation. Platform Engineering as both a technical and strategic engine of change. Real examples of platform design, automation, and governance. How to align technology, culture, and growth. Scaling without losing control: balancing autonomy, security, and sustainability.","tags":["Cloud Computing"],"lang":"English","companies":["Tymit"],"company":"Tymit","short":"Platform Engineering Leadership"},{"day":4,"time":"15:00-15:30","stage":"Visionary Stage","title":"How to Survive an AI That’s Trying to Replace You","speakers":[{"name":"Brais Moure","role":"Software Engineer and Educator at MoureDev"}],"description":"Brais Moure deconstructs the myth of the “dying programmer” to focus on the shift from writing code to designing solutions. Discover why engineering fundamentals are more critical than ever and how to leverage automation without losing technical control. Key Takeaways: The evolving value of the modern developer. Navigating the risks of automated coding. Scaling your career with technical rigor.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":["MoureDev"],"company":"MoureDev","short":"Surviving AI Replacement"},{"day":4,"time":"15:00-15:30","stage":"XPRO stage","title":"AI Observability: Making AI Adoption Safe, Reliable, and Measurable","speakers":[{"name":"Isidre Royo Bonnin","role":"Senior Product Manager at Dynatrace"}],"description":"This session unpacks the real challenges organizations face when adopting AI—from governance and transparency to performance, reliability, and cost. We’ll break down why traditional monitoring falls short in AI-driven environments and how AI observability becomes essential for trust, reliability, and scale. Finally, we’ll show how Dynatrace delivers end‑to‑end visibility across the entire AI lifecycle—from development and testing to production.","tags":["Artificial Intelligence"],"lang":"English","companies":["Dynatrace"],"company":"Dynatrace","short":"AI Observability and Safety"},{"day":4,"time":"15:00-15:30","stage":"Robotics","title":"What I Would Tell Myself 8 Years Ago Before Founding an Indie Studio","speakers":[{"name":"Beatriz Osorio Abraham","role":"Co-founder at Patrones y Escondites S.L."}],"description":"Eight years ago, we founded an indie studio convinced that making good games was the hardest part. Over time, we realized that wasn’t exactly the case. In this session, I will share what we’ve learned along the way: the small decisions that made unexpected differences, the conversations we took too long to have, and the mistakes we made in the games we released. We will talk about teams, contracts, publishers, marketing, and something as unglamorous as cash flow and reach. Not from theory or absolute certainty, but from our own experience, with its successes and its missteps. This is not a talk about what must be done. It’s an open reflection on what we wish we had understood more clearly when we were starting out. Because making a game is a creative challenge. Sustaining a studio over time is something you learn, often through trial and error.","tags":["GAMING"],"lang":"Spanish","companies":["Patrones y Escondites S.L"],"company":"Patrones y Escondites S.L","short":"Indie Studio Lessons Learned"},{"day":4,"time":"15:00-16:00","stage":"Meetup area","title":"Meetup with Eurofirms","speakers":[{"name":"Jaume Dulsat","role":"Country Leader Spain at Eurofirms Group"}],"description":"","tags":["Management"],"lang":"English","companies":["Eurofirms Group"],"company":"Eurofirms Group","short":"Eurofirms Networking Meetup"},{"day":4,"time":"15:00-16:00","stage":"Skills Hub","title":"CTO Leadership Lab: Communicate, Attract, and Retain Tech Talent","speakers":[{"name":"Sandra Alonso","role":"Program Leader at Eurofirms"},{"name":"Marisa Martínez","role":"Diversity & Inclusion Consultant at Eurofirms"},{"name":"Mireia López","role":"Diversity & Inclusion Consultant at Eurofirms"}],"description":"","tags":["Management"],"lang":"Spanish","companies":["Eurofirms"],"company":"Eurofirms","short":"CTO Leadership Development"},{"day":4,"time":"15:00-16:30","stage":"Frontier lab","title":"Testing APIs Like a Boss with BDD","speakers":[{"name":"Javier Ramos Panduro","role":"Solutions Architect at Next Digital"}],"description":"A hands-on workshop on API testing in Python using TDD and BDD to build robust, maintainable software. We’ll cover key concepts and apply them with pytest, pytest-bdd, and a dockerized environment, writing tests before code, defining natural-language scenarios, and automating validation. For developers with basic Python and FastAPI knowledge.","tags":["Software Development"],"lang":"Spanish","companies":["Next Digital"],"company":"Next Digital","short":"API Testing with BDD"},{"day":4,"time":"15:00-16:30","stage":"XPRO Lab","title":"Sovereign AI & FinOps: Turning Cloud Control into Competitive Advantage","speakers":[{"name":"Oriol Jofra","role":"CEO at Digital Maker"}],"description":"As AI costs rise, organizations must innovate without losing financial control. This workshop explores how FinOps enables Sovereign AI by combining financial governance with data residency. Through real-world cases, we demonstrate how to reduce cloud waste and re-architect for efficiency. Join us to learn how to align innovation, profitability, and sovereignty to build resilient, future-ready digital ecosystems.","tags":["Artificial Intelligence"],"lang":"English","companies":["Digital Maker"],"company":"Digital Maker","short":"Sovereign AI and FinOps"},{"day":4,"time":"15:00-18:15","stage":"Focus Lab","title":"Building and Training Open Telco AI Models at Scale","speakers":[{"name":"Farbod Tavakkoli","role":"Data Scientist at AT&T"}],"description":"This masterclass establishes a technical framework for building and training telecom-native AI systems at scale. It details the end-to-end infrastructure required to transition from general-purpose models to domain-specific architectures using ScalarLM. Attendees will see a live demonstration of multi-node training on open Telco AI assets and explore methods for achieving state-of-the-art performance on industry benchmarks.","tags":["Artificial Intelligence"],"lang":"English","companies":["AT&T"],"company":"AT&T","short":"Telco AI Models at Scale"},{"day":4,"time":"15:30-16:00","stage":"Visionary Stage","title":"From Devices to Digital: Building Healthcare Workflows that Matter","speakers":[{"name":"Ernest Buil","role":"Innovation IT Manager at BBraun"}],"description":"Healthcare is moving beyond devices to integrated digital solutions. This session explores how combining medical technology with software, cloud, and data can simplify hospital workflows, reduce friction for clinicians, and improve patient care—turning technology into a true enabler of efficiency and impact.","tags":["Cloud Computing"],"lang":"English","companies":["BBraun"],"company":"BBraun","short":"Digital Healthcare Workflows"},{"day":4,"time":"15:30-16:00","stage":"XPRO stage","title":"Now and Next","speakers":[{"name":"Mara Stefan","role":"Global Insights and Thought Leadership at Harvard Business Review"}],"description":"“Now and Next” frames how organizations and professionals balance today’s urgent needs with a future shaped by AI. With major skill shifts ahead and limited training, AI’s impact depends on investing in people through reskilling, redesigned work, and human‑centered cultures. The “Now” is running today’s business; the “Next” demands leadership to ensure AI augments human capability and drives inclusive growth.","tags":["Management"],"lang":"English","companies":["Harvard Business Review"],"company":"Harvard Business Review","short":"Present and Future Discussion"},{"day":4,"time":"15:30-16:30","stage":"Plug-in Talks","title":"Rebuild AI: Generative AI for Business (Live Demos)","speakers":[{"name":"Eduard Rosicart","role":"Director of Postgraduate Studies in Entrepreneurship and Startup Creation"}],"description":"Generative AI is no longer a trend—it’s competitive infrastructure. In this session, with live demonstrations, we will see how to integrate AI into real business processes to multiply productivity, accelerate decision-making, and create functional solutions without coding. Real cases. Immediate impact. Applicable from day one.","tags":["Artificial Intelligence"],"lang":"Catalan","companies":["EAE Business School"],"company":"EAE Business School","short":"Generative AI for Business"},{"day":4,"time":"15:30-16:30","stage":"Barcelona","title":"Without talent there is no technology: Catalonia’s digital future","speakers":[],"description":"The roundtable will focus on the shortage of digital talent in Catalonia, currently the main barrier to the growth and competitiveness of the ICT sector. We will address this challenge from a cross-cutting perspective: that of the technology sector, through the experience of 3Cat, and that of public policy, with the participation of the Secretariat for Digital Policies and the Secretariat for Equality and Feminism.","tags":["Management"],"lang":"English","companies":[],"company":"","short":"Catalonia Digital Future"},{"day":4,"time":"15:30-16:30","stage":"Hotspot Talks","title":"AI and central banking","speakers":[],"description":"The panel examines how AI is redefining the future of central banking, from enhancing data-driven decision-making to strengthening financial stability frameworks. As AI is increasingly applied to economic forecasting and supervisory analysis, central banks face both unprecedented opportunities and new governance challenges. The discussion will explore emerging use cases.","tags":["Artificial Intelligence"],"lang":"Spanish","companies":[],"company":"","short":"AI in Central Banking"},{"day":4,"time":"15:45-16:15","stage":"Gaming","title":"How to Live 150 Years Through Gaming Biotech","speakers":[{"name":"Karim Casado","role":"SOMNI GAME STUDIOSCEO & Co-Founder & Lead Game Designer"}],"description":"Can a Gaming studio help people live 150 years with a biological age of 30? Can a game do it?How do you build a video game studio like a biotech startup? In this talk, we will address these questions from the very beginning of the idea, the experience, and the decisions we had to make. How it emerged, how it evolved, and how we financed a studio with an unusual mission in the industry: using gaming to directly impact human health and longevity. Today we know that up to 80% of our life expectancy and quality of life depends on modifiable habits such as movement, strength, rest, or nutrition. However, most solutions fail due to lack of adherence. The problem is not information, it is behavior. Based on that premise, we structured the studio as a startup: strategic funding, clear narrative, complementary team, and impact metrics, while trying to maintain art and storytelling as differentiating elements. It is not just about creating a game, but about designing systems that help people live 150 years with a biological age of 30.","tags":["GAMING"],"lang":"Spanish","companies":["Somni Game Studios"],"company":"Somni Game Studios","short":"Biotech Gaming Innovation"},{"day":4,"time":"16:00-16:30","stage":"XPRO stage","title":"Cybersecurity during the product and AI development process","speakers":[{"name":"Albert Sampietro Ventosa","role":"VP Engineering for Accounting products at SAGE"}],"description":"In the context of a big software product company (11.000 employees), this presentation describes how the SDLC is evolving to add security-by-design principles for modern product development with of AI for internal and external usage. Key areas include: secure coding practices, the role of the security architects and DevSecOps automation. Special focus on AI-specific risks: data poisoning, prompt injection, model theft, and training data privacy. Emphasizes building security culture in software engineering teams.","tags":["Cybersecurity"],"lang":"English","companies":["SAGE"],"company":"SAGE","short":"Secure Product Development"},{"day":4,"time":"16:00-16:30","stage":"Visionary Stage","title":"The AI ROI Trap","speakers":[{"name":"Michael Cleavinger","role":"VP Global Data Science and Advanced Analytics at Pepsico"}],"description":"Most organizations measure AI ROI through efficiency—hours saved or tasks automated—but these rarely reflect real business impact. This session reframes ROI around velocity, decision flow, reliability, and impact. We’ll discuss why demos impress but don’t scale, how generative and agentic AI fit long-term progress, and why deployment requires balancing innovation risk and reward.","tags":["Artificial Intelligence"],"lang":"English","companies":["Pepsico"],"company":"Pepsico","short":"Understanding AI ROI"},{"day":4,"time":"16:00-17:00","stage":"Meetup area","title":"Vueling Meet up","speakers":[{"name":"Jordi Pujol","role":"Head of Artifical Intelligence at Vueling"}],"description":"Coming Soon","tags":["Artificial Intelligence"],"lang":"English","companies":["Vueling"],"company":"Vueling","short":"Vueling Networking Meetup"},{"day":4,"time":"16:15-17:15","stage":"Skills Hub","title":"Hack Your Interview: Face Interviews with Confidence and Authenticity","speakers":[],"description":"In a tech sector where cognitive diversity drives innovation, approaching interviews with authenticity is key. Neurodiversity adds value to the recruitment process. This workshop provides practical tools for managing interviews and communication with confidence, helping neurodivergent and diverse individuals showcase their talent, strengthen self-awareness, and enter the tech sector with greater assurance.","tags":["Management"],"lang":"Spanish","companies":[],"company":"","short":"Interview Confidence Hacks"},{"day":4,"time":"16:30-17:00","stage":"Visionary Stage","title":"Profitable, Pragmatic, and Still Standing: Building a €130M Revenue Fintech by Being Contrarian","speakers":[{"name":"Francesc Pla Prats","role":"CTO at SeQura"}],"description":"Monolith when everyone screamed microservices. Profitable when startups were supposed to burn. Small teams when scale demanded process. For years, being contrarian wasn’t just working at seQura, it was our advantage. Then we hit 100 engineers and the rebellions that saved us started killing us. This is the story of what we got right by ignoring best practices, what we got catastrophically wrong, and the harder lesson: it’s not about being a rebel or a conformist. It’s about knowing which rules to break and which ones will break you.","tags":["Software Development"],"lang":"English","companies":["SeQura"],"company":"SeQura","short":"Building Profitable Fintech"},{"day":4,"time":"16:30-17:00","stage":"XPRO stage","title":"Improving patients’ life through artificial intelligence in pharma","speakers":[{"name":"Alexander Holbach","role":"Head of Clinical Data Management at Bayer"}],"description":"Patients often face disconnection from their expectations and the reality of their clinical experience. Artificial intelligence (AI) offers promising solutions focused on optimizing drug discovery and streamlining clinical trials. AI can help us to bridge the gap, leading to more patient-centric healthcare.","tags":["Artificial Intelligence"],"lang":"English","companies":["Bayer"],"company":"Bayer","short":"AI in Pharma for Pat
