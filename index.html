<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWC Talent Arena 2026 – Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/filters.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/events.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/timeline.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <div class="topbar-inner">
    <button class="day-indicator" id="dayIndicator" onclick="switchDay()">
      <span id="dayIndicatorText">Mar 3</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg>
    </button>

    <div class="view-icons">
      <button data-view="timeline" onclick="setView('timeline')" title="Timeline view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="8" height="3" rx="1"/><rect x="4" y="7" width="11" height="3" rx="1"/><rect x="2" y="12" width="6" height="3" rx="1"/></svg>
        <span class="view-label">Timeline</span>
      </button>
      <button data-view="calendar" onclick="setView('calendar')" title="Calendar view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="1.5"/><line x1="1" y1="6" x2="15" y2="6"/><line x1="5" y1="1" x2="5" y2="3"/><line x1="11" y1="1" x2="11" y2="3"/></svg>
        <span class="view-label">Calendar</span>
      </button>
      <button data-view="list" onclick="setView('list')" title="List view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="3" x2="15" y2="3"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="13" x2="15" y2="13"/></svg>
        <span class="view-label">List</span>
      </button>
    </div>

    <div class="topbar-spacer"></div>

    <button id="showHighlightedBtn" class="topbar-action" onclick="toggleShowHighlightedOnly()" title="Starred sessions">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2.2 4.5 5 .7-3.6 3.5.85 5L8 12.4l-4.45 2.3.85-5L.8 6.2l5-.7z"/></svg>
      <span class="action-badge" id="starBadge"></span>
    </button>
    <button id="showHiddenBtn" class="topbar-action" onclick="toggleShowHidden()" title="Hidden sessions">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2.5"/><line x1="2" y1="14" x2="14" y2="2"/></svg>
      <span class="action-badge" id="hiddenBadge"></span>
    </button>

    <button id="filterToggleBtn" class="filter-trigger" onclick="toggleFilterPanel()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 2h14l-5 6v5l-4 2V8z"/></svg>
      <span class="filter-trigger-label">Filters</span>
      <span id="filterDot" class="filter-dot"></span>
    </button>

    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
      <input id="searchBox" placeholder="Search sessions, speakers..." oninput="applyFilters()" onkeydown="if(!this._typed){this.select();this._typed=true}" onfocus="this._typed=false">
      <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear search">&times;</button>
    </div>
  </div>
</div>

<!-- ── Filter Panel (slide-down) ── -->
<div class="filter-panel" id="filterPanel">
  <div class="filter-group">
    <div class="filter-group-label">Stages</div>
    <div class="filter-chips" id="stageChips"></div>
  </div>
  <div class="filter-group">
    <div class="filter-group-label">Topics</div>
    <div class="filter-chips" id="tagChips"></div>
  </div>
  <div class="filter-group">
    <div class="filter-group-label">Language</div>
    <div class="filter-chips" id="langChips"></div>
  </div>
  <div class="filter-group">
    <button id="restoreAllBtn" class="restore-all-btn" onclick="restoreAll()" style="display:none">Restore all hidden</button>
  </div>
</div>

<!-- ── Content ── -->
<div class="content" id="content"></div>

<footer class="site-footer"><a href="mwc_talent_arena_full.ics" download>Export calendar (.ics)</a> &middot; <a href="help.html">Help</a> &middot; <a href="about.html">About</a> &middot; <a href="https://github.com/xicodomingues/mwc-talent-arena-2026" target="_blank" rel="noopener">GitHub</a></footer>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <button class="modal-x" onclick="closeModal()" title="Close">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
